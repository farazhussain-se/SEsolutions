<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="widget-name" content="Cornerstone Learning">
    <meta name="widget-description" content="Cornerstone LMS integration with course catalog, notifications, gamification profile, and team leaderboard.">
    <title>Cornerstone Learning Integration</title>
    <style>
        :root {
            --primary-purple: #5D2E8E;
            --primary-purple-light: #F3EFFF;
            --text-dark: #1F1F1F;
            --text-grey: #666666;
            --bg-light: #F8F9FA;
            --white: #FFFFFF;
            --border-radius: 12px;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Container Simulation */
        .app-container {
            width: 375px;
            height: 812px; /* iPhone X height */
            background-color: var(--white);
            border-radius: 0;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 44px 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .brand-icon {
            width: 24px;
            height: 24px;
            background-color: var(--primary-purple);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cw-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #ddd;
            background-image: url('https://i.pravatar.cc/100?img=5');
            background-size: cover;
        }

        /* Tabs */
        .tabs {
            display: flex;
            padding: 0 20px;
            border-bottom: 1px solid #eee;
            margin-bottom: 16px;
        }

        .cw-tab-btn {
            background: none;
            border: none;
            padding: 12px 0;
            margin-right: 24px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-grey);
            cursor: pointer;
            position: relative;
        }

        .cw-tab-btn.active {
            color: var(--text-dark);
            font-weight: 600;
        }

        .cw-tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--text-dark);
        }

        /* Scrollable Content */
        .content-area {
            flex: 1;
            overflow-y: auto;
            /* Bottom padding reduced since nav is gone */
            padding: 0 20px 20px 20px; 
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .content-area::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome */

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
        }

        .cw-filter-btn {
            font-size: 12px;
            color: var(--text-grey);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        /* Course Grid */
        .course-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .course-card {
            background: var(--white);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .course-card:hover {
            transform: translateY(-2px);
        }

        .card-img-wrap {
            height: 100px;
            width: 100%;
            background-color: #eee;
            border-radius: 8px;
            margin-bottom: 8px;
            position: relative;
            overflow: hidden;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cw-status-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            color: white;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }

        .status-required { background: rgba(30, 30, 30, 0.8); }
        .status-inprogress { background: rgba(255, 140, 0, 0.9); }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            font-size: 11px;
            color: var(--text-grey);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 2px;
        }

        .card-due {
            font-size: 11px;
            color: var(--text-grey);
        }

        /* Modal / Detail View */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 92%;
            background: var(--white);
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 101;
            display: flex;
            flex-direction: column;
        }

        .modal-active .modal-overlay { opacity: 1; pointer-events: auto; }
        .modal-active .modal-content { transform: translateY(0); }

        .modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cw-close-btn {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-grey);
        }

        .modal-scroll {
            overflow-y: auto;
            padding: 0 20px 100px 20px;
            flex: 1;
        }

        .hero-img {
            width: 100%;
            height: 180px;
            background: #eee;
            border-radius: 12px;
            margin-bottom: 20px;
            object-fit: cover;
        }

        .detail-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .detail-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-grey);
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #eee;
        }

        .detail-desc-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .detail-desc {
            font-size: 14px;
            color: var(--text-grey);
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .detail-desc ul {
            padding-left: 20px;
            margin-top: 8px;
        }

        .cta-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: var(--white);
            border-top: 1px solid #eee;
        }

        .cw-btn {
            width: 100%;
            background-color: var(--primary-purple);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Notification Panel */
        .notif-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--white);
            z-index: 200;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .notif-panel.open {
            transform: translateX(0);
        }

        .notif-header {
            padding: 44px 20px 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .notif-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .notif-back-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text-grey);
            padding: 4px;
        }

        .cw-notif-count-badge {
            background: var(--primary-purple);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }

        .notif-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .notif-list::-webkit-scrollbar { display: none; }

        .notif-section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-grey);
            padding: 16px 20px 8px;
        }

        .notif-item {
            display: flex;
            gap: 12px;
            padding: 14px 20px;
            border-bottom: 1px solid #f3f3f3;
            cursor: pointer;
            transition: background 0.15s;
        }

        .notif-item:hover {
            background: #fafafa;
        }

        .notif-item.unread {
            background: var(--primary-purple-light);
        }

        .notif-item.unread:hover {
            background: #ebe4f7;
        }

        .notif-icon-wrap {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .notif-icon-urgent { background: #FEE2E2; }
        .notif-icon-due { background: #FEF3C7; }
        .notif-icon-assign { background: #E0E7FF; }
        .notif-icon-complete { background: #D1FAE5; }
        .notif-icon-event { background: #F3E8FF; }

        .notif-body {
            flex: 1;
            min-width: 0;
        }

        .notif-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 2px;
            line-height: 1.3;
        }

        .notif-desc {
            font-size: 12px;
            color: var(--text-grey);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .notif-time {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
        }

        .notif-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary-purple);
            flex-shrink: 0;
            margin-top: 6px;
        }

        .notif-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-grey);
        }

        .notif-empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .bell-btn {
            position: relative;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            font-size: 18px;
            line-height: 1;
        }

        .cw-bell-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background: red;
            border-radius: 50%;
        }

        .cw-avatar {
            cursor: pointer;
        }

        /* Profile Panel */
        .profile-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-light);
            z-index: 200;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .profile-panel.open {
            transform: translateX(0);
        }

        .profile-header {
            padding: 44px 20px 20px 20px;
            background: var(--white);
            border-bottom: 1px solid #eee;
        }

        .profile-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .profile-header-top h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .profile-back-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text-grey);
            padding: 4px;
        }

        .profile-card {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .profile-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-image: url('https://i.pravatar.cc/100?img=5');
            background-size: cover;
            border: 3px solid var(--primary-purple);
            position: relative;
            flex-shrink: 0;
        }

        .cw-profile-level-badge {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background: var(--primary-purple);
            color: white;
            font-size: 10px;
            font-weight: 700;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--white);
        }

        .profile-info h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 2px;
        }

        .profile-info .profile-role {
            font-size: 12px;
            color: var(--text-grey);
            margin-bottom: 6px;
        }

        .xp-bar-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .xp-bar {
            flex: 1;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-purple), #9B59B6);
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        .xp-label {
            font-size: 11px;
            color: var(--primary-purple);
            font-weight: 600;
            white-space: nowrap;
        }

        .profile-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px 20px;
            scrollbar-width: none;
        }
        .profile-scroll::-webkit-scrollbar { display: none; }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .cw-stat-card {
            background: var(--white);
            border-radius: 12px;
            padding: 14px 10px;
            text-align: center;
        }

        .cw-stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .cw-stat-label {
            font-size: 11px;
            color: var(--text-grey);
            margin-top: 2px;
        }

        /* Streak */
        .streak-card {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .streak-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .streak-header h4 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .streak-count {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-purple);
        }

        .streak-days {
            display: flex;
            justify-content: space-between;
        }

        .streak-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .streak-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .streak-dot.done {
            background: var(--primary-purple);
            color: white;
        }

        .streak-dot.today {
            background: var(--primary-purple-light);
            color: var(--primary-purple);
            border: 2px solid var(--primary-purple);
        }

        .streak-dot.future {
            background: #f0f0f0;
            color: #ccc;
        }

        .streak-day-label {
            font-size: 10px;
            color: var(--text-grey);
        }

        /* Badges */
        .badges-section {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .badges-section h4 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        .badges-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .cw-badge-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 4px;
        }

        .cw-badge-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .cw-badge-icon.earned {
            background: var(--primary-purple-light);
        }

        .cw-badge-icon.locked {
            background: #f0f0f0;
            filter: grayscale(1);
            opacity: 0.5;
        }

        .cw-badge-name {
            font-size: 10px;
            color: var(--text-grey);
            line-height: 1.2;
        }

        /* Leaderboard */
        .leaderboard-section {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .leaderboard-section h4 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        .lb-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .lb-row:last-child {
            border-bottom: none;
        }

        .lb-row.is-you {
            background: var(--primary-purple-light);
            margin: 0 -16px;
            padding: 10px 16px;
            border-radius: 8px;
        }

        .lb-rank {
            width: 24px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-grey);
            text-align: center;
            flex-shrink: 0;
        }

        .lb-rank.gold { color: #F59E0B; }
        .lb-rank.silver { color: #9CA3AF; }
        .lb-rank.bronze { color: #D97706; }

        .lb-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-size: cover;
            flex-shrink: 0;
        }

        .lb-info {
            flex: 1;
            min-width: 0;
        }

        .lb-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .lb-dept {
            font-size: 11px;
            color: var(--text-grey);
        }

        .lb-xp {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary-purple);
            flex-shrink: 0;
        }

        /* SVG Helper */
        svg { width: 24px; height: 24px; fill: #999; }
        .purple-fill { fill: var(--primary-purple); }

    </style>
</head>
<body>

    <div class="app-container">
        
        <header>
            <div class="brand">
                <div class="brand-icon">★</div>
                <span>Cornerstone</span>
            </div>
            <div class="user-actions">
                <div class="bell-btn" onclick="toggleNotifications()">
                    🔔
                    <div class="cw-bell-badge" id="bell-badge"></div>
                </div>
                <div class="cw-avatar" onclick="toggleProfile()"></div>
            </div>
        </header>

        <div class="tabs">
            <button class="cw-tab-btn active" onclick="switchTab('learnings')" data-i18n="tabLearnings">Learnings</button>
            <button class="cw-tab-btn" onclick="switchTab('recommended')" data-i18n="tabRecommended">Recommended</button>
        </div>

        <div class="content-area" id="main-content">
            </div>

        <div class="profile-panel" id="profile-panel">
            <div class="profile-header">
                <div class="profile-header-top">
                    <div style="display:flex;align-items:center;gap:4px;">
                        <button class="profile-back-btn" onclick="toggleProfile()">←</button>
                        <h2 data-i18n="myProfile">My Profile</h2>
                    </div>
                </div>
                <div class="profile-card">
                    <div class="profile-avatar">
                        <div class="cw-profile-level-badge" id="profile-level">12</div>
                    </div>
                    <div class="profile-info">
                        <h3>Nicole Adams</h3>
                        <div class="profile-role" data-i18n="profileRole">Product Design · Munich</div>
                        <div class="xp-bar-wrap">
                            <div class="xp-bar"><div class="xp-bar-fill" id="xp-bar-fill" style="width:72%"></div></div>
                            <div class="xp-label" id="xp-label">2,160 / 3,000 XP</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="profile-scroll" id="profile-scroll"></div>
        </div>

        <div class="notif-panel" id="notif-panel">
            <div class="notif-header">
                <div style="display:flex; align-items:center;">
                    <button class="notif-back-btn" onclick="toggleNotifications()">←</button>
                    <h2><span data-i18n="notifications">Notifications</span> <span class="cw-notif-count-badge" id="notif-count"></span></h2>
                </div>
                <button class="notif-back-btn" onclick="markAllRead()" title="Mark all as read" style="font-size:14px;" data-i18n="markAllAsRead">✓ All</button>
            </div>
            <div class="notif-list" id="notif-list"></div>
        </div>

        <div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content" id="modal-content">
            <div class="modal-header">
                <h3 data-i18n="trainingDetails">Training Details</h3>
                <button class="cw-close-btn" onclick="closeModal()">×</button>
            </div>

            if (read.length > 0) {
                html += `<div class="notif-section-label">${t.notifEarlier}</div>`;
                read.forEach(n => { html += renderNotifItem(n); });
            }

            if (notifications.length === 0) {
                html = `<div class="notif-empty"><div class="notif-empty-icon">🔔</div><div>${t.noNotifications}</div></div>`;
            }

            list.innerHTML = html;
        }

        function renderNotifItem(n) {
            const icon = notifIconMap[n.type] || notifIconMap.assign;
            return `
                <div class="notif-item ${n.unread ? 'unread' : ''}" onclick="openNotification('${n.id}')">
                    <div class="notif-icon-wrap ${icon.cls}">${icon.emoji}</div>
                    <div class="notif-body">
                        <div class="notif-title">${loc(n, 'title')}</div>
                        <div class="notif-desc">${loc(n, 'desc')}</div>
                        <div class="notif-time">${loc(n, 'time')}</div>
                    </div>
                    ${n.unread ? '<div class="notif-dot"></div>' : ''}
                </div>
            `;
        }

        function toggleNotifications() {
            const panel = document.getElementById('notif-panel');
            panel.classList.toggle('open');
            if (panel.classList.contains('open')) {
                renderNotifications();
            }
        }

        function openNotification(nId) {
            const notif = notifications.find(n => n.id === nId);
            if (!notif) return;
            notif.unread = false;
            renderNotifications();
            if (notif.courseId) {
                toggleNotifications();
                openDetails(notif.courseId);
            }
        }

        function renderGrid(data, title) {
            const statusMap = { 'Required': t.required, 'In progress': t.inProgress, 'New': t.newLabel };
            const typeMap = { 'Online': t.online, 'Event': t.eventType };
            let html = `
                <div class="section-header">
                    <div class="section-title">${title}</div>
                    <div class="cw-filter-btn">${t.filter} ▾</div>
                </div>
                <div class="course-grid">
            `;

            data.forEach(course => {
                let badgeHtml = '';
                if (course.status) {
                    const badgeClass = course.status === 'Required' ? 'status-required' : 'status-inprogress';
                    badgeHtml = `<span class="cw-status-badge ${badgeClass}">${statusMap[course.status] || course.status}</span>`;
                }

                html += `
                    <div class="course-card" onclick="openDetails(${course.id})">
                        <div class="card-img-wrap">
                            <img src="${course.image}" class="card-img" alt="${loc(course, 'title')}">
                            ${badgeHtml}
                        </div>
                        <div class="card-title">${loc(course, 'title')}</div>
                        <div class="card-meta">
                            <span>🎧 ${typeMap[course.type] || course.type}</span> • <span>${loc(course, 'duration')}</span>
                        </div>
                        <div class="card-due">${loc(course, 'dueDate')}</div>
                    </div>
                `;
            });

            html += `</div>`;
            return html;
        }

        function switchTab(tabName) {
            const buttons = document.querySelectorAll('.cw-tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            if (tabName === 'learnings') {
                buttons[0].classList.add('active');
                container.innerHTML = renderGrid(myLearningsData, t.myLearnings);
            } else {
                buttons[1].classList.add('active');
                container.innerHTML = renderGrid(recommendedData, t.recommendedForYou);
            }
        }

            const modalBody = document.getElementById('modal-body');
