<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Shift – Johnson Controls</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: transparent;
}

.widget {
  width: 100%;
  max-width: 400px;
  margin: auto;
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #e8eaed;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);
}

/* DAY TABS */
.tabs {
  display: flex;
  gap: 8px;
  padding: 14px 14px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid #e2e8f0;
  color: #64748b;
  background: #fff;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab.active { background: #002b5c; border-color: #002b5c; color: #fff; }
.tab.off    { color: #cbd5e1; cursor: default; }
.tab:hover:not(.active):not(.off) { background: #f8fafc; border-color: #cbd5e1; }

/* SHIFT SECTION */
.shift-section {
  padding: 28px 20px 24px;
  text-align: center;
}

.shift-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #e8f1fb;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px;
  font-size: 18px;
}

.time-label { font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 5px; }
.time-amount {
  font-size: 34px; font-weight: 800;
  color: #0f172a;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 6px;
}
.time-sub {
  font-size: 12px; color: #94a3b8;
  margin-bottom: 20px;
}

.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
}
.pill-today    { background: #dcfce7; color: #166534; }
.pill-done     { background: #f0f9ff; color: #0c4a6e; }
.pill-upcoming { background: #f8fafc; color: #475569; }
.pill-off      { background: #f1f5f9; color: #94a3b8; }

/* ATTRS GRID */
.divider { height: 1px; background: #f1f5f9; margin: 0 20px 0; }

.attrs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: #f1f5f9;
  border-top: 1px solid #f1f5f9;
}
.attr {
  background: #fff;
  padding: 11px 14px;
}
.attr-label { font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.attr-value { font-size: 12px; font-weight: 700; color: #1e293b; line-height: 1.3; }
.attr-value.blue { color: #0072ce; }

/* FOOTER */
.footer {
  background: #f8fafc;
  border-top: 1px solid #f1f5f9;
  padding: 7px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-brand { font-size: 9px; font-weight: 800; color: #0072ce; letter-spacing: 0.04em; }
.footer-clock { font-size: 9px; color: #94a3b8; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div class="widget">

  <!-- DAY TABS -->
  <div class="tabs">
    <div class="tab" onclick="select(this,0)">Mon 8</div>
    <div class="tab" onclick="select(this,1)">Tue 9</div>
    <div class="tab active" onclick="select(this,2)">Wed 10</div>
    <div class="tab" onclick="select(this,3)">Thu 11</div>
    <div class="tab" onclick="select(this,4)">Fri 12</div>
    <div class="tab off">Sat 13</div>
    <div class="tab off">Sun 14</div>
  </div>

  <!-- SHIFT DISPLAY -->
  <div class="shift-section">
    <div class="shift-icon">🔧</div>
    <div class="time-label">Shift Hours</div>
    <div class="time-amount" id="shiftTime">7:00 AM – 3:30 PM</div>
    <div class="time-sub" id="shiftSub">Dispatch 6:45 AM · 8.5 hrs</div>
    <div class="status-pill pill-today" id="statusPill">● Today</div>
  </div>

  <!-- SHIFT ATTRIBUTES -->
  <div class="attrs">
    <div class="attr">
      <div class="attr-label">Work Order</div>
      <div class="attr-value" id="attrWO">SO-48217</div>
    </div>
    <div class="attr">
      <div class="attr-label">Site</div>
      <div class="attr-value" id="attrSite">Mercy General Hospital</div>
    </div>
    <div class="attr">
      <div class="attr-label">System</div>
      <div class="attr-value" id="attrSystem">Metasys BAS – AHU-3</div>
    </div>
    <div class="attr">
      <div class="attr-label">Service Lead</div>
      <div class="attr-value" id="attrLead">Maria Delgado</div>
    </div>
    <div class="attr">
      <div class="attr-label">Toolbox Talk</div>
      <div class="attr-value blue" id="attrSafety">Lock-Out / Tag-Out</div>
    </div>
    <div class="attr">
      <div class="attr-label">Service Van</div>
      <div class="attr-value" id="attrVan">JCI-1142</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-brand">Johnson Controls</span>
    <span class="footer-clock" id="clock">—</span>
  </div>

</div>

<script>
const SHIFTS = [
  { time: '7:00 AM – 3:30 PM', sub: 'Dispatch 6:45 AM · 8.5 hrs', status: 'done',
    wo: 'SO-47988', site: 'Region One Data Center', system: 'Chiller Plant – CH-2',
    lead: 'Maria Delgado', safety: 'Refrigerant Handling', van: 'JCI-1142' },
  { time: '7:00 AM – 3:30 PM', sub: 'Dispatch 6:45 AM · 8.5 hrs', status: 'done',
    wo: 'SO-48045', site: 'Region One Data Center', system: 'CRAC Units – Row B',
    lead: 'Maria Delgado', safety: 'Arc Flash Awareness', van: 'JCI-1142' },
  { time: '7:00 AM – 3:30 PM', sub: 'Dispatch 6:45 AM · 8.5 hrs', status: 'today',
    wo: 'SO-48217', site: 'Mercy General Hospital', system: 'Metasys BAS – AHU-3',
    lead: 'Maria Delgado', safety: 'Lock-Out / Tag-Out', van: 'JCI-1142' },
  { time: '7:00 AM – 3:30 PM', sub: 'Dispatch 6:45 AM · 8.5 hrs', status: 'upcoming',
    wo: 'SO-48261', site: 'Mercy General Hospital', system: 'Fire Alarm Panel Test',
    lead: 'Maria Delgado', safety: 'Hot Work Permit', van: 'JCI-1142' },
  { time: '7:00 AM – 3:30 PM', sub: 'Dispatch 6:45 AM · 8.5 hrs', status: 'upcoming',
    wo: 'SO-48290', site: 'Lakeside Corporate Campus', system: 'Access Control – Bldg C',
    lead: 'Maria Delgado', safety: 'Working at Heights', van: 'JCI-1142' },
];

const STATUS = {
  today:    { cls: 'pill-today',    label: '● Today'    },
  done:     { cls: 'pill-done',     label: '✓ Completed' },
  upcoming: { cls: 'pill-upcoming', label: '▶ Upcoming'  },
  off:      { cls: 'pill-off',      label: 'Day Off'     },
};

function select(el, idx) {
  if (el.classList.contains('off')) return;
  document.querySelectorAll('.tab:not(.off)').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const s = SHIFTS[idx];
  document.getElementById('shiftTime').textContent   = s.time;
  document.getElementById('shiftSub').textContent    = s.sub;
  document.getElementById('attrWO').textContent      = s.wo;
  document.getElementById('attrSite').textContent    = s.site;
  document.getElementById('attrSystem').textContent  = s.system;
  document.getElementById('attrLead').textContent    = s.lead;
  document.getElementById('attrSafety').textContent  = s.safety;
  document.getElementById('attrVan').textContent     = s.van;
  const st = STATUS[s.status];
  const pill = document.getElementById('statusPill');
  pill.className = 'status-pill ' + st.cls;
  pill.textContent = st.label;
}

function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
