<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Lineage Video</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; }

.video-area {
  position: relative;
  width: 650px;
  padding-top: 56.25%;
  background: #000;
}
.video-area iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
</style>
</head>
<body>

<div class="video-area">
  <iframe
    src="https://www.youtube.com/embed/8BU5OQZ9XrM?rel=0&modestbranding=1&showinfo=0&autoplay=1&mute=1"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
