<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Pay – Patrick Anderson</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: transparent;
}

.widget {
  width: 100%;
  max-width: 400px;
  margin: auto;
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #e8eaed;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);
}

/* PERIOD TABS */
.tabs {
  display: flex;
  gap: 8px;
  padding: 14px 14px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid #e2e8f0;
  color: #64748b;
  background: #fff;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab.active { background: #1e293b; border-color: #1e293b; color: #fff; }
.tab:hover:not(.active) { background: #f8fafc; border-color: #cbd5e1; }

/* PAY SECTION */
.pay-section {
  padding: 28px 20px 24px;
  text-align: center;
}

.pay-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #f1f5f9;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px;
  font-size: 18px;
}

.net-label { font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 5px; }
.net-amount {
  font-size: 38px; font-weight: 800;
  color: #16a34a;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 20px;
}
.net-amount sup { font-size: 20px; vertical-align: super; font-weight: 700; color: #4ade80; }

.divider { height: 1px; background: #f1f5f9; margin: 0 20px 20px; }

.gross-label { font-size: 11px; font-weight: 600; color: #94a3b8; margin-bottom: 4px; }
.gross-amount {
  font-size: 22px; font-weight: 700;
  color: #334155;
  letter-spacing: -0.01em;
}

/* UKG ATTRIBUTES */
.attrs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: #f1f5f9;
  border-top: 1px solid #f1f5f9;
}
.attr {
  background: #fff;
  padding: 11px 14px;
}
.attr-label { font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.attr-value { font-size: 12px; font-weight: 700; color: #1e293b; }

/* FOOTER */
.footer {
  background: #f8fafc;
  border-top: 1px solid #f1f5f9;
  padding: 7px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-ukg  { font-size: 9px; font-weight: 800; color: #e8732a; letter-spacing: 0.04em; }
.footer-next { font-size: 9px; color: #94a3b8; }
</style>
</head>
<body>

<div class="widget">

  <!-- PERIOD TABS -->
  <div class="tabs">
    <div class="tab active" onclick="select(this, 0)">May 4–10</div>
    <div class="tab" onclick="select(this, 1)">Apr 27–May 3</div>
    <div class="tab" onclick="select(this, 2)">Apr 20–26</div>
    <div class="tab" onclick="select(this, 3)">Apr 13–19</div>
  </div>

  <!-- PAY DISPLAY -->
  <div class="pay-section">
    <div class="pay-icon">💵</div>
    <div class="net-label">Net Pay</div>
    <div class="net-amount"><sup>$</sup><span id="netVal">2,273.29</span></div>
    <div class="divider"></div>
    <div class="gross-label">Gross Pay</div>
    <div class="gross-amount" id="grossVal">$ 2,862.50</div>
  </div>

  <!-- UKG ATTRIBUTES -->
  <div class="attrs">
    <div class="attr">
      <div class="attr-label">Salary / Hourly</div>
      <div class="attr-value">Hourly · $42.50</div>
    </div>
    <div class="attr">
      <div class="attr-label">Pay Frequency</div>
      <div class="attr-value">Weekly</div>
    </div>
    <div class="attr">
      <div class="attr-label">Union Code</div>
      <div class="attr-value">IBEW Local 20</div>
    </div>
    <div class="attr">
      <div class="attr-label">FLSA Type</div>
      <div class="attr-value">Non-Exempt</div>
    </div>
    <div class="attr">
      <div class="attr-label">Supervisor</div>
      <div class="attr-value">Jake Caldwell</div>
    </div>
    <div class="attr">
      <div class="attr-label">Employment Status</div>
      <div class="attr-value">Active · Full-Time</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-ukg">UKG Pro</span>
    <span class="footer-next">Next payday: May 16, 2026</span>
  </div>

</div>

<script>
const PERIODS = [
  { net: '2,273.29', gross: '$ 2,862.50' },
  { net: '2,273.29', gross: '$ 2,862.50' },
  { net: '1,941.04', gross: '$ 2,444.75' },
  { net: '1,941.04', gross: '$ 2,444.75' },
];

function select(el, idx) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('netVal').textContent   = PERIODS[idx].net;
  document.getElementById('grossVal').textContent = PERIODS[idx].gross;
}
</script>
</body>
</html>
