<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Huntington Bancshares — HBAN</title>
  <style>
    :root {
      --bg-1: #f7faf5;
      --bg-2: #edf6e8;
      --card: #ffffff;
      --line: #dbe8d5;
      --text: #1d2b22;
      --muted: #627165;
      --sage-dark: #214d2e;
      --abundant-green: #5ba63c;
      --green-soft: #dff0d2;
      --green-pill: #e8f5e3;
      --green-text: #2f7d32;
      --shadow: 0 12px 34px rgba(24, 39, 28, 0.10);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    .widget {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    /* ── Header ── */
    .header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(91,166,60,0.09) 0%, rgba(91,166,60,0.02) 100%);
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo-wrap {
      height: 40px;
      display: flex;
      align-items: center;
    }

    .logo-wrap img {
      height: 40px;
      width: auto;
      object-fit: contain;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .title {
      font-size: 21px;
      line-height: 1.15;
      font-weight: 800;
      color: var(--sage-dark);
    }

    .subtitle {
      margin-top: 5px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Content ── */
    .content { padding: 20px 22px; }

    .price-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .price {
      font-size: 44px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .pill {
      margin-bottom: 4px;
      padding: 6px 11px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    /* ── Chart ── */
    .chart-wrap {
      margin-bottom: 8px;
      border-radius: 14px;
      overflow: hidden;
    }

    svg { display: block; width: 100%; height: auto; }

    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* ── Metrics ── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
      margin-bottom: 18px;
    }

    .metric {
      padding: 12px;
      border: 1px solid #e6eee1;
      border-radius: var(--radius-md);
      background: #fbfcfa;
    }

    .metric-label {
      font-size: 11px;
      color: #6b766f;
      margin-bottom: 5px;
    }

    .metric-value {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    /* ── Campaign tagline ── */
    .campaign {
      padding: 14px 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--sage-dark) 0%, #2e6b40 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-align: center;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--line);
      margin: 16px 0;
    }

    /* ── Live badge ── */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--green-pill);
      color: var(--green-text);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--abundant-green);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.75); }
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      body { padding: 12px; }
      .metrics { grid-template-columns: 1fr 1fr; }
      .price { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="widget" role="region" aria-label="Huntington Bancshares stock information">

    <div class="header">
      <div class="header-row">
        <div>
          <div class="eyebrow">Market snapshot</div>
          <div class="title">Huntington Bancshares</div>
          <div class="subtitle">NASDAQ: HBAN</div>
        </div>
        <div class="logo-wrap">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRGZBdM0v1WQPASXmnSB0TbMUNnX8BLjpimug&s"
            alt="Huntington Bank"
          />
        </div>
      </div>
    </div>

    <div class="content">

      <div class="live-badge">
        <span class="live-dot"></span>
        Live · NASDAQ
      </div>

      <div class="price-row">
        <div class="price" id="price">$15.29</div>
        <div class="pill" id="changePill">▲ 0.20 (1.33%)</div>
      </div>

      <div class="chart-wrap">
        <svg viewBox="0 0 360 84" role="img" aria-label="HBAN intraday price chart">
          <defs>
            <linearGradient id="fillGreen" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stop-color="#dff0d2" stop-opacity="0.95"></stop>
              <stop offset="100%" stop-color="#dff0d2" stop-opacity="0.15"></stop>
            </linearGradient>
          </defs>
          <polygon
            points="8,76 8,62 45,58 82,56 119,49 156,52 193,43 230,39 267,41 304,32 352,26 352,76"
            fill="url(#fillGreen)">
          </polygon>
          <polyline
            points="8,62 45,58 82,56 119,49 156,52 193,43 230,39 267,41 304,32 352,26"
            fill="none"
            stroke="#5ba63c"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round">
          </polyline>
        </svg>
      </div>

      <div class="meta-row">
        <span>Intraday trend</span>
        <span id="updatedAt">Updated 2:00 PM ET</span>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Open</div>
          <div class="metric-value" id="open">$15.10</div>
        </div>
        <div class="metric">
          <div class="metric-label">Day High</div>
          <div class="metric-value" id="high">$15.31</div>
        </div>
        <div class="metric">
          <div class="metric-label">Day Low</div>
          <div class="metric-value" id="low">$15.05</div>
        </div>
        <div class="metric">
          <div class="metric-label">Prev. Close</div>
          <div class="metric-value" id="prevClose">$15.09</div>
        </div>
        <div class="metric">
          <div class="metric-label">Volume</div>
          <div class="metric-value" id="volume">2.18M</div>
        </div>
        <div class="metric">
          <div class="metric-label">Mkt Cap</div>
          <div class="metric-value" id="mktCap">$20.4B</div>
        </div>
      </div>

      <div class="campaign">Let's get more from money.</div>

    </div>
  </div>

  <script>
    const data = {
      price: 15.29,
      change: 0.20,
      changePct: 1.33,
      open: 15.10,
      high: 15.31,
      low: 15.05,
      prevClose: 15.09,
      volume: "2.18M",
      mktCap: "$20.4B",
      updatedAt: "2:00 PM ET"
    };

    function fmt(v) { return `$${Number(v).toFixed(2)}`; }

    function render(d) {
      const up = d.change >= 0;
      document.getElementById("price").textContent = fmt(d.price);
      const pill = document.getElementById("changePill");
      pill.textContent = `${up ? "▲" : "▼"} ${Math.abs(d.change).toFixed(2)} (${Math.abs(d.changePct).toFixed(2)}%)`;
      pill.style.background = up ? "#e8f5e3" : "#fdecec";
      pill.style.color = up ? "#2f7d32" : "#b42318";
      document.getElementById("open").textContent = fmt(d.open);
      document.getElementById("high").textContent = fmt(d.high);
      document.getElementById("low").textContent = fmt(d.low);
      document.getElementById("prevClose").textContent = fmt(d.prevClose);
      document.getElementById("volume").textContent = d.volume;
      document.getElementById("mktCap").textContent = d.mktCap;
      document.getElementById("updatedAt").textContent = `Updated ${d.updatedAt}`;
    }

    render(data);
  </script>
</body>
</html>
