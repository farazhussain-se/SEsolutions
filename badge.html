<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Site Badge – Ruby Gray</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { overflow: hidden; height: auto; background: transparent; }
        body {
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.7); }
            70%  { box-shadow: 0 0 0 7px rgba(74,222,128,0); }
            100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
        }
        .pulse { border-radius: 50%; animation: pulse-ring 2s infinite; }

        .access-stripe {
            background: repeating-linear-gradient(
                45deg,
                #374151,
                #374151 6px,
                #1f2937 6px,
                #1f2937 12px
            );
        }

        button { cursor: pointer; background: none; border: none; font: inherit; }
    </style>
</head>
<body>
    <div id="root">Loading badge…</div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const EMPLOYEE = {
            id:          "EMP-47231",
            firstName:   "Ruby",
            lastName:    "Gray",
            title:       "Senior Assembly Technician",
            department:  "Power Tools Mfg – Line 7",
            site:        "Towson Manufacturing Facility",
            location:    "Towson, MD",
            accessLevel: "LEVEL 3",
            shift:       "Day  06:00 – 14:30",
            expires:     "2026-12-31",
            ppeStatus:   "Compliant",
            safetyHours: 1840,
            certifications: [
                { label: "OSHA 10",        status: "active"   },
                { label: "Forklift Op.",   status: "active"   },
                { label: "ESD Handling",   status: "active"   },
                { label: "Robotics Safety",status: "expiring" }
            ],
            zones: [
                { name: "Assembly Floor",  granted: true  },
                { name: "Tool Test Bay",   granted: true  },
                { name: "Restricted R&D",  granted: false },
                { name: "Logistics Dock",  granted: true  }
            ]
        };

        /* ── tokens ── */
        const C = {
            bg:       '#ffffff',
            surface:  '#f9fafb',
            border:   '#e5e7eb',
            divider:  '#f3f4f6',
            text:     '#111827',
            muted:    '#374151',
            faint:    '#6b7280',
            accent:   '#1d4ed8',   /* neutral corporate blue – no brand color */
            dark:     '#111827',
            success:  { bg:'#f0fdf4', border:'#bbf7d0', text:'#166534' },
            warning:  { bg:'#fffbeb', border:'#fde68a', text:'#92400e' },
            error:    { bg:'#fef2f2', border:'#fecaca', text:'#991b1b' },
        };

        /* ── Badge ── */
        const SiteBadge = () => {
            const qrRef  = useRef(null);
            const [time, setTime]     = useState('');
            const [qrDone, setQrDone] = useState(false);
            const [tab, setTab]       = useState('zones');

            useEffect(() => {
                const tick = () => setTime(new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' }));
                tick();
                const t = setInterval(tick, 1000);
                return () => clearInterval(t);
            }, []);

            useEffect(() => {
                if (qrRef.current && !qrDone) {
                    qrRef.current.innerHTML = '';
                    new QRCode(qrRef.current, {
                        text: `SITE-BADGE|ID:${EMPLOYEE.id}|EMP:${EMPLOYEE.firstName}+${EMPLOYEE.lastName}|SITE:TOWSON|LVL:3`,
                        width: 120, height: 120,
                        colorDark: '#111827', colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    setQrDone(true);
                }
            }, []);

            return (
                <div style={{ maxWidth: 340, margin: '0 auto' }}>
                    <div style={{
                        background: C.bg, borderRadius: 14,
                        overflow: 'hidden', border: `1px solid ${C.border}`,
                        boxShadow: '0 4px 20px rgba(0,0,0,0.10)'
                    }}>
                        {/* ── Header bar ── */}
                        <div style={{ background: C.dark, padding: '7px 13px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span style={{ color: '#fff', fontSize: 11, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 6 }}>
                                <span className="pulse" style={{ width: 8, height: 8, background: '#4ade80', display: 'inline-block', flexShrink: 0 }} />
                                SITE ACCESS ACTIVE
                            </span>
                            <span style={{ color: '#9ca3af', fontSize: 10, fontFamily: 'monospace' }}>{time}</span>
                        </div>

                        {/* ── Access level stripe ── */}
                        <div className="access-stripe" style={{ padding: '5px 13px' }}>
                            <span style={{ color: '#fff', fontSize: 11, fontWeight: 800, letterSpacing: '0.08em' }}>
                                ⚠ {EMPLOYEE.accessLevel} — MANUFACTURING ACCESS
                            </span>
                        </div>

                        {/* ── Profile row ── */}
                        <div style={{ padding: '14px 13px 11px', borderBottom: `1px solid ${C.divider}`, display: 'flex', gap: 12, alignItems: 'flex-start' }}>

                            {/* QR */}
                            <div style={{ flexShrink: 0 }}>
                                <div style={{ padding: 5, border: `2px solid ${C.border}`, borderRadius: 9, background: '#fff' }}>
                                    <div ref={qrRef} />
                                </div>
                                <p style={{ textAlign: 'center', fontSize: 9, color: C.faint, fontFamily: 'monospace', marginTop: 3 }}>{EMPLOYEE.id}</p>
                            </div>

                            {/* Info */}
                            <div style={{ flex: 1, minWidth: 0 }}>
                                {/* Org label – generic */}
                                <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginBottom: 7 }}>
                                    <div style={{
                                        background: C.dark, color: '#fff',
                                        fontWeight: 800, fontSize: 10,
                                        padding: '2px 7px', borderRadius: 3,
                                        letterSpacing: '0.06em'
                                    }}>EMPLOYEE BADGE</div>
                                </div>

                                <p style={{ fontSize: 17, fontWeight: 800, color: C.text, lineHeight: 1.1, marginBottom: 3 }}>
                                    {EMPLOYEE.firstName}<br />{EMPLOYEE.lastName}
                                </p>
                                <p style={{ fontSize: 10, fontWeight: 700, color: C.accent, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 2 }}>
                                    {EMPLOYEE.title}
                                </p>
                                <p style={{ fontSize: 9, color: C.muted, marginBottom: 1 }}>{EMPLOYEE.department}</p>
                                <p style={{ fontSize: 9, color: C.faint, marginBottom: 5 }}>{EMPLOYEE.site}</p>

                                <span style={{
                                    display: 'inline-flex', alignItems: 'center', gap: 4,
                                    background: C.success.bg, borderRadius: 99, padding: '2px 8px',
                                    border: `1px solid ${C.success.border}`
                                }}>
                                    <span style={{ fontSize: 8, fontWeight: 700, color: C.success.text }}>✓ PPE {EMPLOYEE.ppeStatus}</span>
                                </span>
                            </div>
                        </div>

                        {/* ── Shift & safety ── */}
                        <div style={{
                            background: C.surface, padding: '8px 13px',
                            display: 'grid', gridTemplateColumns: '1fr 1fr',
                            gap: 6, borderBottom: `1px solid ${C.divider}`
                        }}>
                            <MetaBlock icon="⏰" label="Shift" value={EMPLOYEE.shift} />
                            <MetaBlock icon="🛡" label="Safety Hours" value={`${EMPLOYEE.safetyHours.toLocaleString()} hrs`} />
                        </div>

                        {/* ── Tabs ── */}
                        <div style={{ display: 'flex', borderBottom: `1px solid ${C.divider}` }}>
                            <TabBtn label="Zone Access"    active={tab==='zones'} accent={C.accent} onClick={() => setTab('zones')} />
                            <TabBtn label="Certifications" active={tab==='certs'} accent={C.accent} onClick={() => setTab('certs')} />
                        </div>

                        {/* ── Tab content ── */}
                        <div style={{ padding: '10px 13px 13px' }}>
                            {tab === 'zones' && (
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
                                    {EMPLOYEE.zones.map((z, i) => <ZoneChip key={i} name={z.name} granted={z.granted} />)}
                                </div>
                            )}
                            {tab === 'certs' && (
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                                    {EMPLOYEE.certifications.map((c, i) => <CertRow key={i} label={c.label} status={c.status} />)}
                                </div>
                            )}
                        </div>

                        {/* ── Footer ── */}
                        <div style={{
                            background: C.dark, padding: '6px 13px',
                            display: 'flex', justifyContent: 'space-between', alignItems: 'center'
                        }}>
                            <span style={{ color: '#6b7280', fontSize: 9 }}>Expires: {EMPLOYEE.expires}</span>
                            <span style={{ color: '#6b7280', fontSize: 9 }}>📍 {EMPLOYEE.location}</span>
                        </div>
                    </div>

                    <p style={{ textAlign: 'center', fontSize: 10, color: '#9ca3af', marginTop: 7 }}>
                        Secure ID • Do not share or screenshot this badge
                    </p>
                </div>
            );
        };

        /* ── Sub-components ── */
        const MetaBlock = ({ icon, label, value }) => (
            <div>
                <p style={{ fontSize: 9, color: '#9ca3af', fontWeight: 600, textTransform: 'uppercase', marginBottom: 1 }}>{icon} {label}</p>
                <p style={{ fontSize: 10, fontWeight: 700, color: '#111827' }}>{value}</p>
            </div>
        );

        const TabBtn = ({ label, active, accent, onClick }) => (
            <button onClick={onClick} style={{
                flex: 1, padding: '7px 4px', fontSize: 11, fontWeight: 700,
                color: active ? accent : '#6b7280',
                borderBottom: active ? `2px solid ${accent}` : '2px solid transparent',
                transition: 'all 0.15s'
            }}>
                {label}
            </button>
        );

        const ZoneChip = ({ name, granted }) => (
            <div style={{
                display: 'flex', alignItems: 'center', gap: 6,
                padding: '7px 9px', borderRadius: 8,
                background: granted ? '#f0fdf4' : '#fef2f2',
                border: `1px solid ${granted ? '#bbf7d0' : '#fecaca'}`
            }}>
                <span style={{ fontSize: 12 }}>{granted ? '✅' : '🚫'}</span>
                <span style={{ fontSize: 10, fontWeight: 700, color: granted ? '#166534' : '#991b1b', lineHeight: 1.2 }}>{name}</span>
            </div>
        );

        const CertRow = ({ label, status }) => {
            const s = {
                active:   { bg:'#f0fdf4', border:'#bbf7d0', text:'#166534', badge:'Active'   },
                expiring: { bg:'#fffbeb', border:'#fde68a', text:'#92400e', badge:'Expiring' },
                expired:  { bg:'#fef2f2', border:'#fecaca', text:'#991b1b', badge:'Expired'  }
            }[status] || { bg:'#f0fdf4', border:'#bbf7d0', text:'#166534', badge:'Active' };
            return (
                <div style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '7px 10px', borderRadius: 8,
                    background: s.bg, border: `1px solid ${s.border}`
                }}>
                    <span style={{ fontSize: 11, fontWeight: 600, color: '#111827' }}>🏅 {label}</span>
                    <span style={{ fontSize: 9, fontWeight: 800, color: s.text, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{s.badge}</span>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<SiteBadge />);
    </script>
</body>
</html>
