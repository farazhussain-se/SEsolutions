<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Lineage Facebook Feed</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: transparent;
  display: flex;
  justify-content: flex-end;
  align-items: flex-start;
}

.widget {
  width: 650px;
  height: 600px;
  background: #161b22;
  border: 1px solid #30363d;
  border-top: none;
  border-right: none;
  border-radius: 0 0 0 14px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: -6px 6px 28px rgba(0,0,0,0.5);
}

/* HEADER */
.widget-header {
  background: linear-gradient(135deg, #1a3a5c, #0e2a45);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid #1877f2;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.lineage-logo {
  background: #1f6feb; color: white; font-weight: 800;
  font-size: 13px; padding: 3px 8px; border-radius: 4px; letter-spacing: 1.5px;
  flex-shrink: 0;
}
.header-title { font-size: 15px; font-weight: 700; color: #79c0ff; }
.header-sub { font-size: 11px; color: #8b949e; margin-top: 2px; }
.fb-badge {
  display: flex; align-items: center; gap: 6px;
  background: #1877f222; border: 1px solid #1877f2;
  border-radius: 12px; padding: 4px 12px;
  font-size: 11px; color: #5b9cf6; font-weight: 700; white-space: nowrap;
}
.fb-dot {
  width: 7px; height: 7px; background: #1877f2;
  border-radius: 50%; animation: pulse 1.4s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* FEED AREA */
.feed-area {
  flex: 1;
  overflow: hidden;
  background: #f0f2f5;
  position: relative;
}

.feed-area iframe {
  position: absolute;
  top: -200px;
  left: 0;
  width: 648px;
  height: 1100px;
  border: none;
  pointer-events: none;
  display: block;
}

/* LOADING OVERLAY */
.feed-loading {
  position: absolute;
  inset: 0;
  background: #f0f2f5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 10;
  transition: opacity 0.5s;
}
.feed-loading p { font-size: 13px; color: #57606a; }
.spinner {
  width: 26px; height: 26px;
  border: 3px solid #d0d7de;
  border-top-color: #1877f2;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* FOOTER */
.widget-footer {
  background: #0d1117;
  border-top: 1px solid #21262d;
  padding: 5px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.footer-left { font-size: 10px; color: #484f58; }
.footer-clock { font-size: 10px; color: #6e7681; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div class="widget">

  <!-- HEADER -->
  <div class="widget-header">
    <div class="header-left">
      <div class="lineage-logo">LINEAGE</div>
      <div>
        <div class="header-title">Facebook Feed</div>
        <div class="header-sub">@lineagelogistics · Latest Post</div>
      </div>
    </div>
    <div class="fb-badge"><div class="fb-dot"></div>LIVE</div>
  </div>

  <!-- FEED -->
  <div class="feed-area">

    <div class="feed-loading" id="feed-loading">
      <div class="spinner"></div>
      <p>Loading latest post…</p>
    </div>

    <iframe
      id="fb-iframe"
      src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Flineagelogistics&tabs=timeline&width=648&height=1100&small_header=true&adapt_container_width=true&hide_cover=true&show_facepile=false&appId="
      scrolling="no"
      frameborder="0"
      allowfullscreen="true"
      allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"
      onload="document.getElementById('feed-loading').style.opacity='0'; setTimeout(()=>document.getElementById('feed-loading').style.display='none',500);">
    </iframe>

  </div>

  <!-- FOOTER -->
  <div class="widget-footer">
    <div class="footer-left">Meta Page Plugin · facebook.com/lineagelogistics</div>
    <div class="footer-clock" id="footer-clock"></div>
  </div>

</div>

<script>
function tick() {
  var now = new Date();
  document.getElementById('footer-clock').textContent =
    now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) + ' · ' +
    now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
tick();
setInterval(tick, 1000);

// Fallback: hide spinner after 5s if onload doesn't fire due to cross-origin
setTimeout(function() {
  var l = document.getElementById('feed-loading');
  if (l) { l.style.opacity='0'; setTimeout(function(){ l.style.display='none'; }, 500); }
}, 5000);
</script>
</body>
</html>
