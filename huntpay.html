<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Payslips</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f0f0;
      display: grid;
      place-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .widget {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      position: relative;
    }

    .widget-inner {
      padding: 24px 24px 24px;
    }

    /* ── Header ── */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 22px;
      font-weight: 800;
      color: #111;
    }

    .tap-hide-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
    }

    .tap-hide-btn:hover { color: #111; }

    .tap-hide-btn svg {
      width: 16px;
      height: 16px;
    }

    /* ── Month Tabs ── */
    .month-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 4px;
      scrollbar-width: none;
    }

    .month-tabs::-webkit-scrollbar { display: none; }

    .month-tab {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1.5px solid #ccc;
      font-size: 13px;
      font-weight: 600;
      background: #fff;
      color: #444;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .month-tab.active {
      border-color: #888;
      background: #f7f7f7;
      color: #111;
    }

    .month-tab:hover:not(.active) { background: #f7f7f7; }

    /* Scrollbar mock */
    .scrollbar-mock {
      height: 5px;
      background: #ddd;
      border-radius: 3px;
      margin: 10px 0 20px;
      width: 30%;
    }

    /* ── Summary Card ── */
    .summary-card {
      background: #f8f8f8;
      border: 1px solid #ececec;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .net-pay-section {
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #fff;
    }

    .net-pay-label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    .net-pay-value {
      font-size: 34px;
      font-weight: 800;
      color: #2e7d32;
      letter-spacing: -0.02em;
    }

    .gross-deductions-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .gross-cell, .deductions-cell {
      padding: 14px 20px;
      text-align: center;
    }

    .gross-cell {
      border-right: 2px solid #fff;
    }

    .cell-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      margin-bottom: 5px;
    }

    .cell-value {
      font-size: 16px;
      font-weight: 700;
      color: #111;
    }

    /* ── Payslips List ── */
    .payslips-title {
      font-size: 16px;
      font-weight: 700;
      color: #111;
      margin-bottom: 12px;
    }

    .payslips-list {
      background: #f8f8f8;
      border: 1px solid #ececec;
      border-radius: 14px;
      overflow: hidden;
    }

    .payslip-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }

    .payslip-row:not(:last-child) {
      border-bottom: 1px solid #e8e8e8;
    }

    .payslip-row:hover { background: #f0f0f0; }

    .payslip-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .file-icon svg {
      width: 18px;
      height: 18px;
      color: #c0392b;
    }

    .payslip-date {
      font-size: 14px;
      font-weight: 700;
      color: #111;
    }

    .payslip-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .payslip-amount {
      font-size: 14px;
      font-weight: 700;
      color: #2e7d32;
    }

    .chevron svg {
      width: 18px;
      height: 18px;
      color: #aaa;
    }

    /* ── Privacy Overlay ── */
    .privacy-overlay {
      position: absolute;
      inset: 60px 0 0 0;
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      transition: opacity 0.2s ease;
      gap: 14px;
    }

    .overlay-text {
      font-size: 16px;
      font-weight: 700;
      color: #111;
      text-align: center;
      line-height: 1.5;
    }

    .eye-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #aaa;
      background: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    }

    .eye-circle svg {
      width: 22px;
      height: 22px;
      color: #555;
    }

    /* Blurred content when hidden */
    .blurable {
      transition: filter 0.2s ease, opacity 0.2s ease;
    }

    .blurred {
      filter: blur(5px);
      opacity: 0.5;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>

<div class="widget">

  <!-- Privacy Overlay -->
  <div class="privacy-overlay" id="overlay" onclick="revealContent()">
    <div class="overlay-text">Tap to view<br/>your payslips</div>
    <div class="eye-circle">
      <!-- Eye icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
  </div>

  <div class="widget-inner">

    <!-- Header -->
    <div class="header-row">
      <h2>My Payslips</h2>
      <button class="tap-hide-btn" id="hide-btn" onclick="hideContent()" style="display:none;">
        <!-- Eye-off icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
        Tap to hide
      </button>
    </div>

    <!-- Blurable Content -->
    <div class="blurable blurred" id="blurable">

      <!-- Month Tabs -->
      <div class="month-tabs">
        <button class="month-tab active" onclick="switchMonth(this)">March 2026</button>
        <button class="month-tab" onclick="switchMonth(this)">February 2026</button>
        <button class="month-tab" onclick="switchMonth(this)">January 2026</button>
      </div>
      <div class="scrollbar-mock"></div>

      <!-- Summary Card -->
      <div class="summary-card">
        <div class="net-pay-section">
          <div class="net-pay-label">Net Pay</div>
          <div class="net-pay-value">8,303.20</div>
        </div>
        <div class="gross-deductions-row">
          <div class="gross-cell">
            <div class="cell-label">Gross Pay</div>
            <div class="cell-value">12,451.26</div>
          </div>
          <div class="deductions-cell">
            <div class="cell-label">Deductions</div>
            <div class="cell-value">4,148.06</div>
          </div>
        </div>
      </div>

      <!-- Payslips List -->
      <div class="payslips-title">Payslips</div>
      <div class="payslips-list">
        <div class="payslip-row">
          <div class="payslip-left">
            <div class="file-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
            </div>
            <span class="payslip-date">03/31/2026</span>
          </div>
          <div class="payslip-right">
            <span class="payslip-amount">4,151.60</span>
            <div class="chevron">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="payslip-row">
          <div class="payslip-left">
            <div class="file-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
            </div>
            <span class="payslip-date">03/15/2026</span>
          </div>
          <div class="payslip-right">
            <span class="payslip-amount">4,151.60</span>
            <div class="chevron">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  function revealContent() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('blurable').classList.remove('blurred');
    document.getElementById('hide-btn').style.display = 'flex';
  }

  function hideContent() {
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('blurable').classList.add('blurred');
    document.getElementById('hide-btn').style.display = 'none';
  }

  function switchMonth(el) {
    document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }
</script>

</body>
</html>
