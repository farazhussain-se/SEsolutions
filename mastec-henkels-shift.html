<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Shift – Henkels Power Delivery</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: transparent;
}

.widget {
  width: 100%;
  max-width: 400px;
  margin: auto;
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #e8eaed;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);
}

/* DAY TABS */
.tabs {
  display: flex;
  gap: 8px;
  padding: 14px 14px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid #e2e8f0;
  color: #64748b;
  background: #fff;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab.active { background: #1e293b; border-color: #1e293b; color: #fff; }
.tab.off    { color: #cbd5e1; cursor: default; }
.tab:hover:not(.active):not(.off) { background: #f8fafc; border-color: #cbd5e1; }

/* SHIFT SECTION */
.shift-section {
  padding: 28px 20px 24px;
  text-align: center;
}

.shift-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #f1f5f9;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px;
  font-size: 18px;
}

.time-label { font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 5px; }
.time-amount {
  font-size: 34px; font-weight: 800;
  color: #0f172a;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 6px;
}
.time-sub {
  font-size: 12px; color: #94a3b8;
  margin-bottom: 20px;
}

.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
}
.pill-today    { background: #dcfce7; color: #166534; }
.pill-done     { background: #f0f9ff; color: #0c4a6e; }
.pill-upcoming { background: #f8fafc; color: #475569; }
.pill-off      { background: #f1f5f9; color: #94a3b8; }

/* ATTRS GRID */
.divider { height: 1px; background: #f1f5f9; margin: 0 20px 0; }

.attrs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: #f1f5f9;
  border-top: 1px solid #f1f5f9;
}
.attr {
  background: #fff;
  padding: 11px 14px;
}
.attr-label { font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.attr-value { font-size: 12px; font-weight: 700; color: #1e293b; line-height: 1.3; }
.attr-value.orange { color: #e8732a; }

/* FOOTER */
.footer {
  background: #f8fafc;
  border-top: 1px solid #f1f5f9;
  padding: 7px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-brand { font-size: 9px; font-weight: 800; color: #e8732a; letter-spacing: 0.04em; }
.footer-clock { font-size: 9px; color: #94a3b8; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div class="widget">

  <!-- DAY TABS -->
  <div class="tabs">
    <div class="tab" onclick="select(this,0)">Mon 4</div>
    <div class="tab" onclick="select(this,1)">Tue 5</div>
    <div class="tab active" onclick="select(this,2)">Wed 6</div>
    <div class="tab" onclick="select(this,3)">Thu 7</div>
    <div class="tab" onclick="select(this,4)">Fri 8</div>
    <div class="tab off">Sat 9</div>
    <div class="tab off">Sun 10</div>
  </div>

  <!-- SHIFT DISPLAY -->
  <div class="shift-section">
    <div class="shift-icon">⚡</div>
    <div class="time-label">Shift Hours</div>
    <div class="time-amount" id="shiftTime">6:00 AM – 4:30 PM</div>
    <div class="time-sub" id="shiftSub">Report by 5:30 AM · 10.5 hrs</div>
    <div class="status-pill pill-today" id="statusPill">● Today</div>
  </div>

  <!-- SHIFT ATTRIBUTES -->
  <div class="attrs">
    <div class="attr">
      <div class="attr-label">Project</div>
      <div class="attr-value" id="attrProject">Greenfield 345kV Substation</div>
    </div>
    <div class="attr">
      <div class="attr-label">Location</div>
      <div class="attr-value" id="attrLocation">Denton, TX</div>
    </div>
    <div class="attr">
      <div class="attr-label">Work Type</div>
      <div class="attr-value" id="attrWork">Grounding Grid & Ductbank</div>
    </div>
    <div class="attr">
      <div class="attr-label">Foreman</div>
      <div class="attr-value" id="attrForeman">Jake Caldwell</div>
    </div>
    <div class="attr">
      <div class="attr-label">STA Topic</div>
      <div class="attr-value orange" id="attrSta">Excavation & Trenching</div>
    </div>
    <div class="attr">
      <div class="attr-label">Per Diem</div>
      <div class="attr-value" id="attrPerdiem">$105 / day</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-brand">Henkels &amp; McCoy</span>
    <span class="footer-clock" id="clock">—</span>
  </div>

</div>

<script>
const SHIFTS = [
  { time: '6:00 AM – 4:30 PM', sub: 'Report by 5:30 AM · 10.5 hrs', status: 'done',
    project: 'I-35 Transmission Corridor', location: 'Gainesville, TX',
    work: 'Tower Erection & Stringing', foreman: 'Jake Caldwell',
    sta: 'Aerial Work Platform', perdiem: '$105 / day' },
  { time: '6:00 AM – 4:30 PM', sub: 'Report by 5:30 AM · 10.5 hrs', status: 'done',
    project: 'I-35 Transmission Corridor', location: 'Gainesville, TX',
    work: 'Conductor Tensioning', foreman: 'Jake Caldwell',
    sta: 'Heat Illness Prevention', perdiem: '$105 / day' },
  { time: '6:00 AM – 4:30 PM', sub: 'Report by 5:30 AM · 10.5 hrs', status: 'today',
    project: 'Greenfield 345kV Substation', location: 'Denton, TX',
    work: 'Grounding Grid & Ductbank', foreman: 'Jake Caldwell',
    sta: 'Excavation & Trenching', perdiem: '$105 / day' },
  { time: '6:00 AM – 4:30 PM', sub: 'Report by 5:30 AM · 10.5 hrs', status: 'upcoming',
    project: 'Greenfield 345kV Substation', location: 'Denton, TX',
    work: 'Equipment Foundations', foreman: 'Jake Caldwell',
    sta: 'Rigging & Lifting', perdiem: '$105 / day' },
  { time: '6:00 AM – 4:30 PM', sub: 'Report by 5:30 AM · 10.5 hrs', status: 'upcoming',
    project: 'Greenfield 345kV Substation', location: 'Denton, TX',
    work: 'Cable Tray & Raceway', foreman: 'Jake Caldwell',
    sta: 'Lock-Out / Tag-Out', perdiem: '$105 / day' },
];

const STATUS = {
  today:    { cls: 'pill-today',    label: '● Today'    },
  done:     { cls: 'pill-done',     label: '✓ Completed' },
  upcoming: { cls: 'pill-upcoming', label: '▶ Upcoming'  },
  off:      { cls: 'pill-off',      label: 'Day Off'     },
};

function select(el, idx) {
  if (el.classList.contains('off')) return;
  document.querySelectorAll('.tab:not(.off)').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const s = SHIFTS[idx];
  document.getElementById('shiftTime').textContent    = s.time;
  document.getElementById('shiftSub').textContent     = s.sub;
  document.getElementById('attrProject').textContent  = s.project;
  document.getElementById('attrLocation').textContent = s.location;
  document.getElementById('attrWork').textContent     = s.work;
  document.getElementById('attrForeman').textContent  = s.foreman;
  document.getElementById('attrSta').textContent      = s.sta;
  document.getElementById('attrPerdiem').textContent  = s.perdiem;
  const st = STATUS[s.status];
  const pill = document.getElementById('statusPill');
  pill.className = 'status-pill ' + st.cls;
  pill.textContent = st.label;
}

function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
