<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBAN — Huntington Bancshares</title>
  <style>
    :root {
      --green:        #5ba63c;
      --green-dark:   #214d2e;
      --green-mid:    #2e6b40;
      --green-light:  #dff0d2;
      --green-bg:     #f7faf5;
      --card:         #ffffff;
      --border:       #dbe8d5;
      --text:         #1d2b22;
      --muted:        #627165;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--green-bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system,
                   BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    .widget {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(24, 39, 28, 0.09);
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(
        180deg,
        rgba(91, 166, 60, 0.09) 0%,
        rgba(91, 166, 60, 0.02) 100%
      );
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1;    transform: scale(1);    }
      50%       { opacity: 0.4; transform: scale(0.7);  }
    }

    .company-name {
      font-size: 19px;
      font-weight: 800;
      color: var(--green-dark);
      line-height: 1.2;
    }

    .logo-wrap img {
      height: 38px;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
    }

    /* ── TradingView overrides ── */
    .tradingview-widget-container {
      width: 100%;
    }

    .tradingview-widget-copyright {
      padding: 2px 14px 5px;
    }

    /* ── Footer tagline ── */
    .footer {
      padding: 13px 18px 15px;
      background: linear-gradient(
        135deg,
        var(--green-dark) 0%,
        var(--green-mid)  100%
      );
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.015em;
    }
  </style>
</head>
<body>
  <div class="widget" role="region" aria-label="Huntington Bancshares stock — HBAN">

    <div class="header">
      <div>
        <div class="header-meta">
          <span class="live-dot"></span>
          NASDAQ: HBAN
        </div>
        <div class="company-name">Huntington Bancshares</div>
      </div>
      <div class="logo-wrap">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRGZBdM0v1WQPASXmnSB0TbMUNnX8BLjpimug&s"
          alt="Huntington Bank"
        />
      </div>
    </div>

    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <div class="tradingview-widget-copyright">
        <a
          href="https://www.tradingview.com/symbols/NASDAQ-HBAN/"
          rel="noopener"
          target="_blank"
        >
          <span style="color:#3179f5;font-size:10px;font-family:sans-serif">HBAN on TradingView</span>
        </a>
      </div>
      <script
        type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js"
        async
      >
      {
        "symbol": "NASDAQ:HBAN",
        "width": "100%",
        "height": 230,
        "locale": "en",
        "dateRange": "1D",
        "colorTheme": "light",
        "trendLineColor": "#5ba63c",
        "underLineColor": "rgba(91,166,60,0.18)",
        "underLineBottomColor": "rgba(91,166,60,0.02)",
        "isTransparent": true,
        "autosize": true,
        "largeChartUrl": ""
      }
      </script>
    </div>

    <div class="footer">Let's get more from money.</div>

  </div>
</body>
</html>
