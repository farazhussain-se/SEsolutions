<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huntington Bank Payslip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .payslip-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
        }
        
        .payslip-header {
            background: linear-gradient(135deg, #005670 0%, #004a5c 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .logo-svg {
            width: 40px;
            height: 40px;
            margin-bottom: 10px;
        }
        
        .payslip-header h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .employee-info {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .payslip-content {
            padding: 20px;
            position: relative;
            transition: filter 0.3s ease;
        }
        
        .payslip-content.blurred {
            filter: blur(10px);
            pointer-events: none;
        }
        
        .reveal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.95);
            z-index: 10;
            transition: opacity 0.3s ease;
        }
        
        .reveal-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .reveal-button {
            background: #005670;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s ease;
        }
        
        .reveal-button:active {
            background: #004a5c;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #005670;
            margin-top: 20px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .section-title:first-child {
            margin-top: 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-bottom: 16px;
        }
        
        table th {
            background: #f0f0f0;
            color: #333;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e0e0e0;
        }
        
        table td {
            padding: 10px;
            border-bottom: 1px solid #e8e8e8;
        }
        
        table tr:last-child td {
            border-bottom: none;
        }
        
        .amount {
            text-align: right;
            font-weight: 500;
            color: #005670;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e8e8e8;
            font-size: 13px;
        }
        
        .summary-row:last-child {
            border-bottom: none;
        }
        
        .summary-label {
            font-weight: 500;
            color: #333;
        }
        
        .summary-value {
            font-weight: 600;
            color: #005670;
        }
        
        .footer {
            background: #f9f9f9;
            padding: 16px 20px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #e8e8e8;
            text-align: center;
        }
        
        .footer-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
        }
        
        @media (max-width: 480px) {
            .payslip-container {
                border-radius: 0;
            }
            
            table th, table td {
                padding: 8px;
                font-size: 12px;
            }
            
            .payslip-header {
                padding: 16px;
            }
            
            .payslip-header h2 {
                font-size: 20px;
            }
            
            .payslip-content {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script>
        // Minimal Reactful simulation
        class PayslipComponent {
            constructor(props = {}) {
                this.state = {
                    isRevealed: false
                };
                this.props = props;
                this.element = null;
                this.render();
            }
            
            setState(updates) {
                this.state = { ...this.state, ...updates };
                this.render();
            }
            
            handleMouseDown = () => {
                this.setState({ isRevealed: true });
            }
            
            handleMouseUp = () => {
                this.setState({ isRevealed: false });
            }
            
            render() {
                const { isRevealed } = this.state;
                
                const html = `
                    <div class="payslip-container">
                        <div class="payslip-header">
                            <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <rect width="100" height="100" fill="#005670"/>
                                <text x="50" y="65" font-size="60" font-weight="bold" text-anchor="middle" fill="white">H</text>
                            </svg>
                            <h2>Payslip</h2>
                            <div class="employee-info">
                                <strong>John Doe</strong><br>
                                ID: 12345<br>
                                Period: 03/01/2026 - 03/15/2026
                            </div>
                        </div>
                        
                        <div class="payslip-content ${isRevealed ? '' : 'blurred'}">
                            <div class="section-title">Summary</div>
                            <div class="summary-row">
                                <span class="summary-label">Gross Pay (YTD):</span>
                                <span class="summary-value">$10,000</span>
                            </div>
                            <div class="summary-row">
                                <span class="summary-label">Taxes (YTD):</span>
                                <span class="summary-value">$2,400</span>
                            </div>
                            <div class="summary-row">
                                <span class="summary-label">Deductions (YTD):</span>
                                <span class="summary-value">$1,600</span>
                            </div>
                            <div class="summary-row">
                                <span class="summary-label">Net Pay (YTD):</span>
                                <span class="summary-value">$6,000</span>
                            </div>
                            
                            <div class="section-title">Earnings</div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Description</th>
                                        <th class="amount">Amount</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>Regular Hours (80 @ $40/hr)</td>
                                        <td class="amount">$3,200</td>
                                    </tr>
                                    <tr>
                                        <td>Bonus</td>
                                        <td class="amount">$1,800</td>
                                    </tr>
                                </tbody>
                            </table>
                            
                            <div class="section-title">Deductions</div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Description</th>
                                        <th class="amount">Amount</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>Health Insurance</td>
                                        <td class="amount">$400</td>
                                    </tr>
                                    <tr>
                                        <td>401(k)</td>
                                        <td class="amount">$400</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <div class="reveal-overlay ${isRevealed ? 'hidden' : ''}">
                            <button class="reveal-button" id="revealBtn">Hold to reveal payslip</button>
                        </div>
                        
                        <div class="footer">
                            <span class="footer-label">Direct Deposit</span>
                            <span>Huntington Bank Account ****1234</span>
                        </div>
                    </div>
                `;
                
                const app = document.getElementById('app');
                app.innerHTML = html;
                
                const revealBtn = document.getElementById('revealBtn');
                revealBtn.addEventListener('mousedown', this.handleMouseDown);
                revealBtn.addEventListener('mouseup', this.handleMouseUp);
                revealBtn.addEventListener('mouseleave', this.handleMouseUp);
                revealBtn.addEventListener('touchstart', this.handleMouseDown);
                revealBtn.addEventListener('touchend', this.handleMouseUp);
                revealBtn.addEventListener('touchcancel', this.handleMouseUp);
            }
        }
        
        // Mount component
        new PayslipComponent();
    </script>
</body>
</html>
