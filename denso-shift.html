<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Shift – DENSO</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: transparent;
}

.widget {
  width: 100%;
  max-width: 400px;
  margin: auto;
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #e8eaed;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);
}

/* DAY TABS */
.tabs {
  display: flex;
  gap: 8px;
  padding: 14px 14px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid #e2e8f0;
  color: #64748b;
  background: #fff;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab.active { background: #cc0000; border-color: #cc0000; color: #fff; }
.tab.off    { color: #cbd5e1; cursor: default; }
.tab:hover:not(.active):not(.off) { background: #f8fafc; border-color: #cbd5e1; }

/* SHIFT SECTION */
.shift-section {
  padding: 28px 20px 24px;
  text-align: center;
}

.shift-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #fdeaea;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px;
  font-size: 18px;
}

.time-label { font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 5px; }
.time-amount {
  font-size: 34px; font-weight: 800;
  color: #0f172a;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 6px;
}
.time-sub {
  font-size: 12px; color: #94a3b8;
  margin-bottom: 20px;
}

.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
}
.pill-today    { background: #dcfce7; color: #166534; }
.pill-done     { background: #f0f9ff; color: #0c4a6e; }
.pill-upcoming { background: #f8fafc; color: #475569; }
.pill-off      { background: #f1f5f9; color: #94a3b8; }

/* ATTRS GRID */
.divider { height: 1px; background: #f1f5f9; margin: 0 20px 0; }

.attrs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: #f1f5f9;
  border-top: 1px solid #f1f5f9;
}
.attr {
  background: #fff;
  padding: 11px 14px;
}
.attr-label { font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.attr-value { font-size: 12px; font-weight: 700; color: #1e293b; line-height: 1.3; }
.attr-value.red { color: #cc0000; }

/* FOOTER */
.footer {
  background: #f8fafc;
  border-top: 1px solid #f1f5f9;
  padding: 7px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-brand { font-size: 9px; font-weight: 800; color: #cc0000; letter-spacing: 0.08em; }
.footer-clock { font-size: 9px; color: #94a3b8; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div class="widget">

  <!-- DAY TABS -->
  <div class="tabs">
    <div class="tab" onclick="select(this,0)">Mon 15</div>
    <div class="tab active" onclick="select(this,1)">Tue 16</div>
    <div class="tab" onclick="select(this,2)">Wed 17</div>
    <div class="tab" onclick="select(this,3)">Thu 18</div>
    <div class="tab" onclick="select(this,4)">Fri 19</div>
    <div class="tab off">Sat 20</div>
    <div class="tab off">Sun 21</div>
  </div>

  <!-- SHIFT DISPLAY -->
  <div class="shift-section">
    <div class="shift-icon">⚙️</div>
    <div class="time-label">Shift Hours</div>
    <div class="time-amount" id="shiftTime">6:00 AM – 2:30 PM</div>
    <div class="time-sub" id="shiftSub">Pre-shift 5:50 AM · A Shift · 8.5 hrs</div>
    <div class="status-pill pill-today" id="statusPill">● Today</div>
  </div>

  <!-- SHIFT ATTRIBUTES -->
  <div class="attrs">
    <div class="attr">
      <div class="attr-label">Line / Cell</div>
      <div class="attr-value" id="attrLine">Thermal – Line 4</div>
    </div>
    <div class="attr">
      <div class="attr-label">Build</div>
      <div class="attr-value" id="attrBuild">HVAC Condenser Assy</div>
    </div>
    <div class="attr">
      <div class="attr-label">Station</div>
      <div class="attr-value" id="attrStation">Brazing · OP-30</div>
    </div>
    <div class="attr">
      <div class="attr-label">Team Lead</div>
      <div class="attr-value" id="attrLead">Maria Delgado</div>
    </div>
    <div class="attr">
      <div class="attr-label">Toolbox Talk</div>
      <div class="attr-value red" id="attrSafety">PPE &amp; Pinch Points</div>
    </div>
    <div class="attr">
      <div class="attr-label">Build Order</div>
      <div class="attr-value" id="attrWO">BO-48217</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-brand">DENSO</span>
    <span class="footer-clock" id="clock">—</span>
  </div>

</div>

<script>
const SHIFTS = [
  { time: '6:00 AM – 2:30 PM', sub: 'Pre-shift 5:50 AM · A Shift · 8.5 hrs', status: 'done',
    line: 'Thermal – Line 4', build: 'HVAC Condenser Assy', station: 'Core Build · OP-10',
    lead: 'Maria Delgado', safety: 'Hand & Power Tools', wo: 'BO-47988' },
  { time: '6:00 AM – 2:30 PM', sub: 'Pre-shift 5:50 AM · A Shift · 8.5 hrs', status: 'today',
    line: 'Thermal – Line 4', build: 'HVAC Condenser Assy', station: 'Brazing · OP-30',
    lead: 'Maria Delgado', safety: 'PPE & Pinch Points', wo: 'BO-48217' },
  { time: '6:00 AM – 2:30 PM', sub: 'Pre-shift 5:50 AM · A Shift · 8.5 hrs', status: 'upcoming',
    line: 'Thermal – Line 4', build: 'Radiator Sub-Assy', station: 'Leak Test · OP-50',
    lead: 'Maria Delgado', safety: 'Lock-Out / Tag-Out', wo: 'BO-48261' },
  { time: '6:00 AM – 2:30 PM', sub: 'Pre-shift 5:50 AM · A Shift · 8.5 hrs', status: 'upcoming',
    line: 'Thermal – Line 2', build: 'EV Battery Cooler', station: 'Assembly · OP-20',
    lead: 'Maria Delgado', safety: 'Ergonomics & Lifting', wo: 'BO-48290' },
  { time: '6:00 AM – 2:30 PM', sub: 'Pre-shift 5:50 AM · A Shift · 8.5 hrs', status: 'upcoming',
    line: 'Thermal – Line 2', build: 'EV Battery Cooler', station: 'Final QA · OP-70',
    lead: 'Maria Delgado', safety: 'Kaizen / 5S Walk', wo: 'BO-48324' },
];

const STATUS = {
  today:    { cls: 'pill-today',    label: '● Today'    },
  done:     { cls: 'pill-done',     label: '✓ Completed' },
  upcoming: { cls: 'pill-upcoming', label: '▶ Upcoming'  },
  off:      { cls: 'pill-off',      label: 'Day Off'     },
};

function select(el, idx) {
  if (el.classList.contains('off')) return;
  document.querySelectorAll('.tab:not(.off)').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const s = SHIFTS[idx];
  document.getElementById('shiftTime').textContent   = s.time;
  document.getElementById('shiftSub').textContent    = s.sub;
  document.getElementById('attrLine').textContent    = s.line;
  document.getElementById('attrBuild').textContent   = s.build;
  document.getElementById('attrStation').textContent = s.station;
  document.getElementById('attrLead').textContent    = s.lead;
  document.getElementById('attrSafety').textContent  = s.safety;
  document.getElementById('attrWO').textContent      = s.wo;
  const st = STATUS[s.status];
  const pill = document.getElementById('statusPill');
  pill.className = 'status-pill ' + st.cls;
  pill.textContent = st.label;
}

function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
