<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Canada Crew Badge</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: transparent; }
        body { padding: 10px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        :focus-visible { outline: 3px solid #111111; outline-offset: 2px; border-radius: 4px; }

        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(216,47,47,0.7); }
            70%  { box-shadow: 0 0 0 7px rgba(216,47,47,0); }
            100% { box-shadow: 0 0 0 0 rgba(216,47,47,0); }
        }
        .pulse { border-radius: 50%; animation: pulse-ring 2s infinite; }

        .ac-stripe {
            background: repeating-linear-gradient(
                45deg,
                #D82F2F,
                #D82F2F 8px,
                #B12525 8px,
                #B12525 16px
            );
        }

        button { cursor: pointer; background: none; border: none; font: inherit; }
    </style>
</head>
<body>
<div id="root">Loading…</div>

<script type="text/babel">
/* ─────────────────────────────────────────
   Staffbase user-name placeholder
   Primary: {{user.profile.firstName}} (resolved server-side by StaticContent)
   Fallback: "Maria" — used if the placeholder is unresolved (preview,
   missing profile field, or rendered outside a Staffbase context)
───────────────────────────────────────── */
const RAW_FIRST_NAME = "{{user.profile.firstName}}";
const FIRST_NAME =
    (RAW_FIRST_NAME && !RAW_FIRST_NAME.includes("{{") && RAW_FIRST_NAME.trim().length > 0)
        ? RAW_FIRST_NAME.trim()
        : "Maria";

/* ─────────────────────────────────────────
   AIR CANADA – CREW BADGE DATA
───────────────────────────────────────── */
const EMPLOYEE = {
    id:          "AC-CRW-48217",
    firstName:   FIRST_NAME,
    lastName:    "Apathangelou",
    title:       "In-Flight Service Director",
    department:  "Cabin Crew · Mainline",
    base:        "YYZ — Toronto Pearson",
    address:     "Air Canada Centre · 7373 Côte-Vertu W, Montréal, QC",
    fleet:       "B777 / B787 / A330",
    shift:       "Rotation 4-on / 3-off",
    expires:     "2027-08-31",
    medicalStatus: "Current",
    languages:   "EN · FR",
    flightHours: 8420,
    certifications: [
        { label: "Transport Canada Cabin Safety",  status: "active"   },
        { label: "Dangerous Goods (IATA DGR)",     status: "active"   },
        { label: "First Aid / AED",                status: "active"   },
        { label: "Emergency Evacuation – B777",    status: "active"   },
        { label: "Emergency Evacuation – B787",    status: "active"   },
        { label: "Recurrent Training",             status: "expiring" },
    ],
    zones: [
        { name: "Crew Lounge — YYZ",      granted: true  },
        { name: "Airside / Ramp",         granted: true  },
        { name: "Flight Deck Jumpseat",   granted: true  },
        { name: "Maple Leaf Lounge",      granted: true  },
        { name: "Hangar — Restricted",    granted: false },
        { name: "Crew Scheduling Ops",    granted: true  },
    ]
};

/* ─────────────────────────────────────────
   Air Canada palette — WCAG-safe combinations
───────────────────────────────────────── */
const C = {
    bg:       "#ffffff",
    surface:  "#fafafa",
    border:   "#d4d4d4",
    divider:  "#f4f4f5",
    text:     "#111111",   /* 18.4:1 on white ✓ */
    muted:    "#374151",   /*  9.7:1 on white ✓ */
    faint:    "#6b7280",   /*  4.6:1 on white ✓ */
    dark:     "#1a1a1a",
    red:      "#D82F2F",   /* AC brand red */
    redDark:  "#B12525",
    onRed:    "#ffffff",   /* white on AC red: 4.8:1 ✓ */
    accent:   "#B12525",   /* darker red for text on white: 5.7:1 ✓ */
    success:  { bg: "#f0fdf4", border: "#86efac", text: "#166534" },
    warning:  { bg: "#fffbeb", border: "#fde68a", text: "#92400e" },
    error:    { bg: "#fef2f2", border: "#fecaca", text: "#991b1b" },
};

const { useState, useEffect, useRef } = React;

const Badge = () => {
    const qrRef               = useRef(null);
    const [time, setTime]     = useState("");
    const [qrDone, setQrDone] = useState(false);
    const [tab, setTab]       = useState("zones");

    useEffect(() => {
        const tick = () =>
            setTime(new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }));
        tick();
        const t = setInterval(tick, 1000);
        return () => clearInterval(t);
    }, []);

    useEffect(() => {
        if (qrRef.current && !qrDone) {
            qrRef.current.innerHTML = "";
            new QRCode(qrRef.current, {
                text: `AIRCANADA|ID:${EMPLOYEE.id}|${EMPLOYEE.firstName}+${EMPLOYEE.lastName}|BASE:YYZ`,
                width: 116, height: 116,
                colorDark: C.dark, colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            setQrDone(true);
        }
    }, []);

    return (
        <div style={{ maxWidth: 340, margin: "0 auto" }}>
            <div style={{
                background: C.bg,
                borderRadius: 14,
                overflow: "hidden",
                border: `1px solid ${C.border}`,
                boxShadow: "0 4px 20px rgba(0,0,0,0.10)"
            }}>

                {/* ── Header ── */}
                <div style={{
                    background: C.dark,
                    padding: "8px 13px",
                    display: "flex", justifyContent: "space-between", alignItems: "center",
                    borderBottom: `3px solid ${C.red}`
                }}>
                    <span style={{ color: "#fff", fontSize: 11, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}>
                        <span className="pulse" style={{ width: 8, height: 8, background: C.red, display: "inline-block", flexShrink: 0 }} aria-hidden="true" />
                        BADGE ACTIVE
                    </span>
                    <span style={{ color: C.red, fontSize: 13, fontWeight: 900, letterSpacing: "0.12em", display: "flex", alignItems: "center", gap: 4 }}>
                        <span aria-hidden="true">🍁</span> AIR CANADA
                    </span>
                    <span style={{ color: "#9ca3af", fontSize: 10, fontFamily: "monospace" }} aria-live="off">{time}</span>
                </div>

                {/* ── Red brand stripe ── */}
                <div className="ac-stripe" style={{ padding: "5px 13px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span style={{ color: C.onRed, fontSize: 10, fontWeight: 800, letterSpacing: "0.07em" }}>
                        ✈ MAINLINE CABIN CREW · {EMPLOYEE.languages}
                    </span>
                    <span style={{
                        background: C.dark, color: "#fff",
                        fontSize: 8, fontWeight: 900,
                        padding: "1px 6px", borderRadius: 3,
                        letterSpacing: "0.05em"
                    }}>YYZ</span>
                </div>

                {/* ── Profile row ── */}
                <div style={{
                    padding: "13px 13px 11px",
                    borderBottom: `1px solid ${C.divider}`,
                    display: "flex", gap: 11, alignItems: "flex-start"
                }}>

                    {/* QR */}
                    <div style={{ flexShrink: 0 }}>
                        <div style={{ padding: 4, border: `2px solid ${C.border}`, borderRadius: 8, background: "#fff" }}
                             role="img" aria-label={`QR code for crew ID ${EMPLOYEE.id}`}>
                            <div ref={qrRef} />
                        </div>
                        <p style={{ textAlign: "center", fontSize: 8, color: C.faint, fontFamily: "monospace", marginTop: 3 }}>
                            {EMPLOYEE.id}
                        </p>
                    </div>

                    {/* Info */}
                    <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 6 }}>
                            <div style={{
                                background: C.red, color: C.onRed,
                                fontWeight: 800, fontSize: 9,
                                padding: "2px 6px", borderRadius: 3, letterSpacing: "0.05em"
                            }}>AIR CANADA</div>
                            <div style={{
                                background: C.dark, color: "#fff",
                                fontWeight: 800, fontSize: 9,
                                padding: "2px 6px", borderRadius: 3, letterSpacing: "0.05em"
                            }}>YYZ BASE</div>
                        </div>

                        <p style={{ fontSize: 18, fontWeight: 800, color: C.text, lineHeight: 1.1, marginBottom: 3 }}>
                            {EMPLOYEE.firstName}<br />{EMPLOYEE.lastName}
                        </p>
                        <p style={{ fontSize: 10, fontWeight: 700, color: C.accent, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 2 }}>
                            {EMPLOYEE.title}
                        </p>
                        <p style={{ fontSize: 9, color: C.muted, marginBottom: 1 }}>{EMPLOYEE.department}</p>
                        <p style={{ fontSize: 9, color: C.faint, marginBottom: 7 }}>{EMPLOYEE.base}</p>

                        <span style={{
                            display: "inline-flex", alignItems: "center", gap: 4,
                            background: C.success.bg, borderRadius: 99, padding: "2px 8px",
                            border: `1px solid ${C.success.border}`
                        }}>
                            <span style={{ fontSize: 8, fontWeight: 700, color: C.success.text }}>✓ MEDICAL {EMPLOYEE.medicalStatus}</span>
                        </span>
                    </div>
                </div>

                {/* ── Stats row ── */}
                <div style={{
                    background: C.surface, padding: "8px 13px",
                    display: "grid", gridTemplateColumns: "1fr 1fr 1fr",
                    gap: 6, borderBottom: `1px solid ${C.divider}`
                }}>
                    <StatBlock icon="🛫" label="Fleet"        value={EMPLOYEE.fleet} />
                    <StatBlock icon="⏱"  label="Flight Hrs"   value={`${EMPLOYEE.flightHours.toLocaleString()}`} />
                    <StatBlock icon="🗓"  label="Rotation"     value={EMPLOYEE.shift} />
                </div>

                {/* ── Base address row ── */}
                <div style={{
                    background: "#fff5f5",
                    padding: "5px 13px",
                    borderBottom: `1px solid ${C.divider}`,
                    display: "flex", alignItems: "center", gap: 6
                }}>
                    <span aria-hidden="true" style={{ fontSize: 10 }}>📍</span>
                    <span style={{ fontSize: 9, fontWeight: 600, color: "#7f1d1d" }}>
                        {EMPLOYEE.address}
                    </span>
                </div>

                {/* ── Tabs ── */}
                <div style={{ display: "flex", borderBottom: `1px solid ${C.divider}` }} role="tablist">
                    <TabBtn id="tab-zones" panelId="panel-zones" label="Zone Access"    active={tab === "zones"} onClick={() => setTab("zones")} />
                    <TabBtn id="tab-certs" panelId="panel-certs" label="Certifications" active={tab === "certs"} onClick={() => setTab("certs")} />
                </div>

                {/* ── Tab content ── */}
                <div style={{ padding: "10px 13px 13px" }}>
                    {tab === "zones" && (
                        <div id="panel-zones" role="tabpanel" aria-labelledby="tab-zones"
                             style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                            {EMPLOYEE.zones.map((z, i) => <ZoneChip key={i} name={z.name} granted={z.granted} />)}
                        </div>
                    )}
                    {tab === "certs" && (
                        <div id="panel-certs" role="tabpanel" aria-labelledby="tab-certs"
                             style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                            {EMPLOYEE.certifications.map((c, i) => <CertRow key={i} label={c.label} status={c.status} />)}
                        </div>
                    )}
                </div>

                {/* ── Footer ── */}
                <div style={{
                    background: C.dark, padding: "6px 13px",
                    display: "flex", justifyContent: "space-between", alignItems: "center",
                    borderTop: `2px solid ${C.red}`
                }}>
                    <span style={{ color: "#9ca3af", fontSize: 9 }}>Expires: {EMPLOYEE.expires}</span>
                    <span style={{ color: C.red, fontSize: 9, fontWeight: 700 }}>🍁 Air Canada · YYZ</span>
                </div>
            </div>

            <p style={{ textAlign: "center", fontSize: 10, color: "#6b7280", marginTop: 7 }}>
                Crew Identification · Do not share or duplicate
            </p>
        </div>
    );
};

/* ── Sub-components ── */

const StatBlock = ({ icon, label, value }) => (
    <div>
        <p style={{ fontSize: 8, color: "#6b7280", fontWeight: 600, textTransform: "uppercase", marginBottom: 1 }} aria-hidden="true">
            {icon} {label}
        </p>
        <p style={{ fontSize: 9, fontWeight: 700, color: "#111111", lineHeight: 1.3 }}>{value}</p>
    </div>
);

const TabBtn = ({ id, panelId, label, active, onClick }) => (
    <button
        id={id}
        role="tab"
        aria-selected={active}
        aria-controls={panelId}
        onClick={onClick}
        style={{
            flex: 1, padding: "8px 4px", fontSize: 11, fontWeight: 700,
            color: active ? "#111111" : "#6b7280",
            borderBottom: active ? `3px solid #D82F2F` : "3px solid transparent",
            transition: "all 0.15s",
            minHeight: 36
        }}
    >
        {label}
    </button>
);

const ZoneChip = ({ name, granted }) => (
    <div style={{
        display: "flex", alignItems: "center", gap: 6,
        padding: "7px 9px", borderRadius: 8,
        background: granted ? "#f0fdf4" : "#fef2f2",
        border: `1px solid ${granted ? "#86efac" : "#fecaca"}`
    }}
    role="status"
    aria-label={`${name}: ${granted ? "Access granted" : "Access denied"}`}>
        <span aria-hidden="true" style={{ fontSize: 12 }}>{granted ? "✅" : "🚫"}</span>
        <span style={{ fontSize: 10, fontWeight: 700, color: granted ? "#166534" : "#991b1b", lineHeight: 1.2 }}>{name}</span>
    </div>
);

const CertRow = ({ label, status }) => {
    const s = {
        active:   { bg: "#f0fdf4", border: "#86efac", text: "#166534", badge: "Active"   },
        expiring: { bg: "#fffbeb", border: "#fde68a", text: "#92400e", badge: "Expiring" },
        expired:  { bg: "#fef2f2", border: "#fecaca", text: "#991b1b", badge: "Expired"  },
    }[status] || { bg: "#f0fdf4", border: "#86efac", text: "#166534", badge: "Active" };

    return (
        <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            padding: "7px 10px", borderRadius: 8,
            background: s.bg, border: `1px solid ${s.border}`
        }}
        role="status"
        aria-label={`${label}: ${s.badge}`}>
            <span style={{ fontSize: 11, fontWeight: 600, color: "#111111" }}>🏅 {label}</span>
            <span style={{ fontSize: 9, fontWeight: 800, color: s.text, textTransform: "uppercase", letterSpacing: "0.05em" }}>{s.badge}</span>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById("root")).render(<Badge />);
</script>
</body>
</html>
