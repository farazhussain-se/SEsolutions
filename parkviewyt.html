<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Parkview Connections Podcast</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
body { background: transparent; }

.podcast-title {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 14px;
  background: #00467f;          /* Parkview navy */
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  line-height: 1.2;
}
.podcast-title svg { flex: 0 0 auto; }

.video-area {
  position: relative;
  width: 100%;             /* adaptive width */
  padding-top: 56.25%;     /* 16:9 — change to 75% if cropped (4:3) */
  background: #000;
  overflow: hidden;
}
.video-area iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
</style>
</head>
<body>

<div class="podcast-title">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
  </svg>
  Parkview Connections Podcast
</div>

<div class="video-area">
  <iframe
    src="https://www.youtube.com/embed/videoseries?list=PL51YvQCeSkiKLSnWZRDTY7d9evmTzKxFj&rel=0&modestbranding=1"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
