<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Absences</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f0f0;
      display: grid;
      place-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .widget {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    /* ── Top padding area ── */
    .widget-inner {
      padding: 24px 24px 0;
    }

    h2 {
      font-size: 22px;
      font-weight: 800;
      color: #111;
      margin-bottom: 14px;
    }

    .section-label {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      margin-bottom: 12px;
    }

    /* ── Balance cards row ── */
    .cards-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 0;
    }

    .balance-card {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
    }

    .card-icon {
      background: #f2f2f2;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon svg {
      width: 40px;
      height: 40px;
      color: #555;
    }

    .card-body {
      padding: 12px 14px 14px;
      background: #fff;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }

    .card-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 3px;
    }

    .card-value {
      font-size: 14px;
      font-weight: 700;
      color: #111;
    }

    /* ── Scrollbar mock ── */
    .scrollbar-mock {
      height: 5px;
      background: #ddd;
      border-radius: 3px;
      margin: 16px 0;
      width: 75%;
    }

    /* ── Toggle row ── */
    .toggle-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 12px 0 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      border-top: 1px solid #f0f0f0;
    }

    .toggle-row:hover { color: #000; }

    .toggle-icon {
      width: 15px;
      height: 15px;
      color: #555;
      flex-shrink: 0;
    }

    /* ── Lower section ── */
    .lower {
      padding: 0 24px 24px;
      border-top: 1px solid #f0f0f0;
    }

    .absences-title {
      font-size: 18px;
      font-weight: 700;
      color: #111;
      padding-top: 20px;
      margin-bottom: 2px;
    }

    .absences-year {
      font-size: 13px;
      color: #666;
      margin-bottom: 14px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab {
      padding: 6px 16px;
      border-radius: 8px;
      border: 1.5px solid #ccc;
      font-size: 13px;
      font-weight: 600;
      background: #fff;
      color: #444;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab.active {
      border-color: #888;
      background: #f7f7f7;
      color: #111;
    }

    .tab:hover:not(.active) {
      background: #f7f7f7;
    }

    /* ── Empty state ── */
    .empty-state {
      background: #f7f7f7;
      border-radius: 14px;
      padding: 36px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      margin-bottom: 14px;
      color: #888;
      position: relative;
    }

    .empty-icon-bg {
      position: absolute;
      inset: -6px;
      background: #ddd;
      border-radius: 50%;
      filter: blur(12px);
      z-index: 0;
    }

    .empty-icon svg {
      position: relative;
      z-index: 1;
      width: 56px;
      height: 56px;
    }

    .empty-title {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.55;
      max-width: 240px;
    }
  </style>
</head>
<body>

<div class="widget">
  <div class="widget-inner">

    <h2>My Absences</h2>
    <p class="section-label">Absence Balance</p>

    <!-- Balance Cards -->
    <div class="cards-row">
      <!-- PTO -->
      <div class="balance-card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 18c0-4-5-8-5-8s-5 4-5 8"/>
            <path d="M12 10V3"/>
            <path d="M8 7c1-1 2.5-2 4-2s3 1 4 2"/>
            <line x1="3" y1="21" x2="21" y2="21"/>
            <path d="M7 21c0-2 1-3 2-4"/>
            <path d="M17 21c0-2-1-3-2-4"/>
          </svg>
        </div>
        <div class="card-body">
          <div class="card-title">Paid Time Off</div>
          <div class="card-label">Balance</div>
          <div class="card-value" id="pto-value">69.8 hours</div>
        </div>
      </div>

      <!-- Floating Holiday -->
      <div class="balance-card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="16" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <circle cx="16" cy="15" r="3"/>
            <polyline points="16 14 16 15 17 15"/>
          </svg>
        </div>
        <div class="card-body">
          <div class="card-title">Floating Holiday</div>
          <div class="card-label">Balance</div>
          <div class="card-value" id="fh-value">16 hours</div>
        </div>
      </div>
    </div>

    <!-- Scrollbar mock -->
    <div class="scrollbar-mock"></div>

    <!-- Toggle -->
    <div class="toggle-row" id="toggle-btn" onclick="toggleUnits()">
      <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0"/>
        <path d="M12 8v4l3 3"/>
      </svg>
      <span id="toggle-label">Show balances in days (8h/day)</span>
    </div>
  </div>

  <!-- Lower Section -->
  <div class="lower">
    <div class="absences-title">Absences</div>
    <div class="absences-year">2026</div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab(this, 'requests')">Your Requests</button>
      <button class="tab" onclick="switchTab(this, 'history')">History</button>
    </div>

    <!-- Empty State -->
    <div class="empty-state">
      <div class="empty-icon">
        <div class="empty-icon-bg"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="16" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/>
        </svg>
      </div>
      <div class="empty-title">No Requests Yet</div>
      <div class="empty-desc">Once you've submitted absence requests, you can view them here.</div>
    </div>
  </div>
</div>

<script>
  let showingDays = false;
  const ptoHours = 69.8;
  const fhHours = 16;

  function toggleUnits() {
    showingDays = !showingDays;
    const ptoEl = document.getElementById('pto-value');
    const fhEl = document.getElementById('fh-value');
    const label = document.getElementById('toggle-label');

    if (showingDays) {
      ptoEl.textContent = (ptoHours / 8).toFixed(1) + ' days';
      fhEl.textContent = (fhHours / 8).toFixed(1) + ' days';
      label.textContent = 'Show balances in hours';
    } else {
      ptoEl.textContent = ptoHours + ' hours';
      fhEl.textContent = fhHours + ' hours';
      label.textContent = 'Show balances in days (8h/day)';
    }
  }

  function switchTab(el, tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }
</script>

</body>
</html>
