<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendar Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .widget {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      padding: 20px 22px;
      width: 340px;
      max-width: 100%;
    }
    .event-card {
      border-bottom: 1px solid #ececec;
      padding-bottom: 18px;
      margin-bottom: 18px;
    }
    .event-card:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .event-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .event-day {
      font-weight: 700;
      font-size: 15px;
      color: #1a1a1a;
    }
    .event-date {
      font-weight: 400;
      font-size: 14px;
      color: #6b6b6b;
    }
    .event-body {
      display: flex;
      gap: 10px;
    }
    .event-bar {
      width: 3px;
      border-radius: 2px;
      background: #3b82f6;
      flex-shrink: 0;
      align-self: stretch;
    }
    .event-details {
      flex: 1;
    }
    .event-time {
      font-size: 12px;
      color: #6b6b6b;
      margin-bottom: 2px;
    }
    .event-title {
      font-weight: 600;
      font-size: 14px;
      color: #1a1a1a;
      margin-bottom: 2px;
      line-height: 1.35;
    }
    .event-time-end {
      font-size: 12px;
      color: #6b6b6b;
      margin-bottom: 6px;
    }
    .avatars {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0;
    }
    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 600;
      color: #fff;
      margin-right: 4px;
      flex-shrink: 0;
      border: 1.5px solid #fff;
    }
    .avatar-overflow {
      font-size: 11px;
      color: #9b9b9b;
      margin-left: 2px;
    }
  </style>
</head>
<body>
  <div class="widget" id="calendar-widget"></div>

  <script>
    const avatarColors = ['#b0c4de', '#c8a2c8', '#a2d9b1', '#f4c87c', '#f4a27c', '#7cc4f4'];

    const events = [
      {
        day: 'Tuesday',
        date: 'May 12th',
        title: 'Community Education / Wealth-Building Seminar',
        startTime: '12:00 pm',
        endTime: '01:00 pm',
        avatars: ['PN', 'BC', 'NE', 'RO'],
        extra: '+2',
      },
      {
        day: 'Wednesday',
        date: 'May 20th',
        title: 'Voices of Our ERGs Networking Panel',
        startTime: '06:00 pm',
        endTime: '07:00 pm',
        avatars: ['VO', 'ER', 'NP', 'DC'],
        extra: '+2',
      },
      {
        day: 'Monday',
        date: 'June 8th',
        title: 'Black History Month Art Exhibition',
        startTime: '06:00 pm',
        endTime: '08:00 pm',
        avatars: ['BH', 'MA', 'EX', 'RC'],
        extra: '+1',
      },
    ];

    function renderWidget() {
      const widget = document.getElementById('calendar-widget');
      widget.innerHTML = events.map(event => `
        <div class="event-card">
          <div class="event-header">
            <span class="event-day">${event.day}</span>
            <span class="event-date">${event.date}</span>
          </div>
          <div class="event-body">
            <div class="event-bar"></div>
            <div class="event-details">
              <div class="event-time">${event.startTime}</div>
              <div class="event-title">${event.title}</div>
              <div class="event-time-end">${event.endTime}</div>
              <div class="avatars">
                ${event.avatars.map((av, i) =>
                  `<div class="avatar" style="background:${avatarColors[i % avatarColors.length]}">${av}</div>`
                ).join('')}
                <span class="avatar-overflow">${event.extra}</span>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    renderWidget();
  </script>
</body>
</html>
