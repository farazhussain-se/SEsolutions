<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Canada — Event Registration</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  body { padding: 12px; color: #2a2a2a; }
  :focus-visible { outline: 3px solid #D82F2F; outline-offset: 2px; border-radius: 4px; }
  button { cursor: pointer; font: inherit; }

  .ac-event-card {
    max-width: 460px;
    margin: 0 auto;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    border: 1px solid #f0d3d3;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }

  .ac-event-head {
    background: #D82F2F;
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .ac-event-head-left {
    display: flex; align-items: center; gap: 10px;
    min-width: 0;
  }
  .ac-event-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; flex-shrink: 0;
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
  }
  .ac-event-icon svg { width: 18px; height: 18px; fill: #fff; }
  .ac-event-title {
    font-size: 16px; font-weight: 700; line-height: 1.3;
    color: #fff;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ac-event-add,
  .ac-event-add:link,
  .ac-event-add:visited,
  .ac-event-add:hover,
  .ac-event-add:active {
    font-size: 12px; font-weight: 600;
    color: #fff !important;
    text-decoration: none !important;
    padding: 6px 14px; border-radius: 999px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    white-space: nowrap; flex-shrink: 0;
  }
  .ac-event-add:hover { background: rgba(255,255,255,0.28); }

  .ac-event-meta {
    padding: 14px 20px;
    font-size: 14px; color: #374151;
    background: #fff;
    line-height: 1.55;
  }
  .ac-event-meta div { margin-bottom: 4px; }
  .ac-event-meta div:last-child { margin-bottom: 0; }
  .ac-event-meta b { color: #111827; font-weight: 600; }

  .ac-event-rsvp {
    background: #fef4f4;
    border-top: 1px solid #fce8e8;
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .ac-event-rsvp-prompt {
    font-size: 14px; font-weight: 600; color: #111827;
  }
  .ac-event-rsvp-prompt span { color: #D82F2F; }
  .ac-event-rsvp-btns { display: flex; gap: 8px; }
  .ac-event-rsvp-btn {
    padding: 7px 22px; border-radius: 999px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; border: 1px solid transparent;
    transition: background .15s, color .15s, border-color .15s;
  }
  .ac-event-rsvp-btn.yes        { background: #D82F2F; color: #fff; }
  .ac-event-rsvp-btn.yes:hover  { background: #b12525; }
  .ac-event-rsvp-btn.yes.on     { background: #b12525; }
  .ac-event-rsvp-btn.no         { background: #fff; color: #374151; border-color: #d1d5db; }
  .ac-event-rsvp-btn.no:hover   { background: #f9fafb; }
  .ac-event-rsvp-btn.no.on      { background: #f3f4f6; }

  .ac-event-confirm {
    padding: 12px 20px;
    background: #f0fdf4;
    border-top: 1px solid #bbf7d0;
    font-size: 13px;
    color: #166534;
    font-weight: 600;
    display: none;
  }
  .ac-event-confirm.show { display: block; }
  .ac-event-confirm.declined {
    background: #f9fafb;
    border-top-color: #e5e7eb;
    color: #4b5563;
  }
</style>
</head>
<body>

<div class="ac-event-card">
  <div class="ac-event-head">
    <div class="ac-event-head-left">
      <span class="ac-event-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5C3.9 2 3 2.9 3 4v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 18H5V8h14v13zm0-15H5V4h14v2zM7 10h4v4H7z"/></svg>
      </span>
      <span class="ac-event-title">Cleared for Departure</span>
    </div>
    <a class="ac-event-add" href="#" target="_blank" rel="noopener">+ Add to Calendar</a>
  </div>

  <div class="ac-event-meta">
    <div><b>When:</b> May 15, 2026 · 9:00 AM EDT</div>
    <div><b>Where:</b> Live — Townhall</div>
  </div>

  <div class="ac-event-rsvp" id="rsvp">
    <div class="ac-event-rsvp-prompt">Will you be attending, <span id="firstName">Maria</span>?</div>
    <div class="ac-event-rsvp-btns">
      <button class="ac-event-rsvp-btn yes" type="button" id="btn-yes">Yes</button>
      <button class="ac-event-rsvp-btn no"  type="button" id="btn-no">No</button>
    </div>
  </div>

  <div class="ac-event-confirm" id="confirm"></div>
</div>

<script>
/* Staffbase placeholder — primary: {{user.profile.firstName}}, fallback: Maria */
(function () {
  var RAW = "{{user.profile.firstName}}";
  var name = (RAW && RAW.indexOf("{{") === -1 && RAW.trim().length > 0) ? RAW.trim() : "Maria";
  document.getElementById("firstName").textContent = name;
})();

const yes = document.getElementById("btn-yes");
const no  = document.getElementById("btn-no");
const confirm = document.getElementById("confirm");

function setRsvp(choice) {
  if (choice === "yes") {
    yes.classList.add("on"); no.classList.remove("on");
    confirm.textContent = "✓ You're registered. A calendar invite is on its way.";
    confirm.classList.remove("declined");
    confirm.classList.add("show");
  } else {
    no.classList.add("on"); yes.classList.remove("on");
    confirm.textContent = "Thanks — we've noted you won't be attending.";
    confirm.classList.add("declined", "show");
  }
}

yes.addEventListener("click", e => { e.preventDefault(); setRsvp("yes"); });
no.addEventListener("click",  e => { e.preventDefault(); setRsvp("no");  });
</script>

</body>
</html>
