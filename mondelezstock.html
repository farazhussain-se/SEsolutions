<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDLZ Stock Ticker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#fff; --surface:#f5f5f3; --border:rgba(0,0,0,0.08);
    --text:#1a1a1a; --text-muted:#666; --text-faint:#999;
    --green:#1a7a45; --green-bg:#e8f5ee; --red:#c0392b; --red-bg:#fdecea;
    --accent:#003087; --radius:12px;
    --font-body:'DM Sans',sans-serif; --font-mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);background:#f0f0f0;color:var(--text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
  .widget{width:100%;max-width:420px;background:var(--bg);border:1px solid var(--border);
    border-radius:var(--radius);overflow:hidden;
    box-shadow:0 2px 12px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04)}
  .widget-header{background:var(--accent);padding:14px 18px;display:flex;align-items:center;gap:10px}
  .logo-wrap{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:6px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .company-info{flex:1;min-width:0}
  .company-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .company-meta{font-size:11px;color:rgba(255,255,255,.7);display:flex;gap:6px;align-items:center;margin-top:2px}
  .exchange-badge{background:rgba(255,255,255,.2);border-radius:3px;padding:1px 5px;
    font-size:10px;font-weight:500;color:rgba(255,255,255,.9);letter-spacing:.03em}
  .live-dot{display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,.7)}
  .live-dot::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;
    background:#4cde87;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .price-block{padding:18px 18px 8px;display:flex;align-items:flex-end;gap:12px}
  .price-main{font-family:var(--font-mono);font-size:34px;font-weight:500;
    line-height:1;letter-spacing:-.02em;color:var(--text)}
  .price-change-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding-bottom:2px}
  .change-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;
    font-size:12px;font-weight:600;font-family:var(--font-mono);white-space:nowrap}
  .change-badge.up{background:var(--green-bg);color:var(--green)}
  .change-badge.down{background:var(--red-bg);color:var(--red)}
  .change-badge svg{width:10px;height:10px}
  .change-abs{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);padding-left:8px}
  .as-of{font-size:10px;color:var(--text-faint);padding:0 18px 12px}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
  .stat-cell{background:var(--bg);padding:10px 18px;display:flex;flex-direction:column;gap:3px}
  .stat-label{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
  .stat-value{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--text)}
  .chart-area{padding:12px 18px 14px}
  .chart-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);font-weight:500;margin-bottom:8px}
  .spark-wrap{width:100%;height:52px}
  svg.spark{width:100%;height:100%;overflow:visible}
  .widget-footer{border-top:1px solid var(--border);padding:8px 18px;
    display:flex;align-items:center;justify-content:space-between}
  .footer-note{font-size:10px;color:var(--text-faint)}
  .footer-link{font-size:10px;color:var(--accent);text-decoration:none;font-weight:500;opacity:.7}
  .footer-link:hover{opacity:1}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  .loading{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
    background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:4px}
  .error-state{padding:20px 18px;text-align:center;color:var(--text-muted);font-size:12px}
  .refresh-btn{display:inline-flex;align-items:center;gap:4px;margin-top:8px;
    background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:4px 12px;font-size:11px;color:var(--text-muted);cursor:pointer;font-family:var(--font-body)}
  .refresh-btn:hover{background:#e8e8e8}
</style>
</head>
<body>
<div class="widget" id="widget">
  <div class="widget-header">
    <div class="logo-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white"
        stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </svg>
    </div>
    <div class="company-info">
      <div class="company-name">Mondelēz International</div>
      <div class="company-meta">
        <span class="exchange-badge">NASDAQ</span>
        <span>MDLZ</span>
        <span class="live-dot">Live</span>
      </div>
    </div>
  </div>
  <div id="main-content">
    <div style="padding:20px 18px 8px">
      <div class="loading" style="width:150px;height:34px;margin-bottom:10px;"></div>
      <div class="loading" style="width:100px;height:18px;"></div>
    </div>
    <div style="height:1px;background:rgba(0,0,0,.07);margin:0 18px;"></div>
    <div style="padding:12px 18px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="loading" style="height:36px;border-radius:4px;"></div>
      <div class="loading" style="height:36px;border-radius:4px;"></div>
      <div class="loading" style="height:36px;border-radius:4px;"></div>
      <div class="loading" style="height:36px;border-radius:4px;"></div>
    </div>
  </div>
</div>
