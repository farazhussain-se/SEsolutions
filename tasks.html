<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="widget-name" content="My Tasks">
<meta name="widget-description" content="Crew tasks card — greeting, today + this-week task lists, completion state, due-date pills, and section dividers.">
<title>My Tasks</title>
<style>
  :root {
    --bg-page: #f3f4f6;
    --surface: #ffffff;
    --row-hover: #fafafa;
    --border: #eef0f3;
    --text: #111827;
    --text-soft: #374151;
    --text-muted: #6b7280;
    --text-faint: #9ca3af;
    --check: #d1d5db;
    --check-done-border: #1f7a2a;
    --check-done-bg: #e7f6ea;
    --check-done-fg: #1f7a2a;
    --done-bg: #fdecd2;
    --done-fg: #8a4f12;
    --today-bg: #fdecd2;
    --today-fg: #8a4f12;
    --journey-bg: #dbe5fc;
    --journey-fg: #1e3a8a;
    --date-bg: #f5efd6;
    --date-fg: #5f4e1c;
    --avatar-bg: #d3def5;
    --avatar-fg: #1e3a8a;
    --radius: 16px;
    --shadow: 0 2px 16px rgba(20,20,20,0.06), 0 1px 3px rgba(20,20,20,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg-page);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 24px 16px;
    min-height: 100vh;
  }

  .tasks-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 700px;
    overflow: hidden;
  }

  /* ── Greeting header ── */
  .tasks-greeting {
    display: grid;
    grid-template-columns: 56px 1fr;
    align-items: center;
    gap: 16px;
    padding: 22px 24px 20px;
  }
  .tasks-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--avatar-bg);
    color: var(--avatar-fg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .greeting-title {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.25;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .greeting-sub {
    margin-top: 4px;
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: -0.005em;
  }

  .divider {
    border-top: 1px solid var(--border);
  }

  /* ── My Tasks heading ── */
  .tasks-header {
    padding: 20px 24px 8px;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.015em;
  }

  /* ── Section label ── */
  .section-label {
    padding: 18px 24px 10px;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-faint);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── Task rows ── */
  .tasks-list { display: flex; flex-direction: column; }
  .task-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: start;
    column-gap: 14px;
    padding: 14px 24px 16px;
    border-top: 1px solid var(--border);
    transition: background .15s ease;
  }
  .task-row:first-child { border-top: 0; }
  .task-row:hover { background: var(--row-hover); }

  .task-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--check);
    background: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    transition: border-color .15s ease, background .15s ease;
  }
  .task-check svg { width: 12px; height: 12px; color: transparent; transition: color .15s ease; }
  .task-check:hover { border-color: var(--text-muted); }
  .task-check:hover svg { color: var(--text-muted); }

  /* Square-edged checkbox style for completed tasks (matches reference). */
  .task-row.done .task-check {
    border-radius: 5px;
    border-color: var(--check-done-border);
    background: var(--check-done-bg);
  }
  .task-row.done .task-check svg { color: var(--check-done-fg); }
  .task-row.done .task-title {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .task-body {
    display: flex;
    flex-direction: column;
    min-width: 0;
    padding-top: 1px;
  }
  .task-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    letter-spacing: -0.005em;
  }
  .task-sub {
    margin-top: 6px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.3;
  }

  .task-pill {
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 999px;
    line-height: 1.2;
    white-space: nowrap;
    letter-spacing: 0.01em;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .task-pill.done    { background: var(--done-bg);    color: var(--done-fg); }
  .task-pill.today   { background: var(--today-bg);   color: var(--today-fg); }
  .task-pill.journey { background: var(--journey-bg); color: var(--journey-fg); }
  .task-pill.date    { background: var(--date-bg);    color: var(--date-fg); }

  @media (max-width: 480px) {
    .tasks-greeting { grid-template-columns: 48px 1fr; gap: 14px; padding: 20px 18px 16px; }
    .tasks-avatar   { width: 48px; height: 48px; font-size: 16px; }
    .greeting-title { font-size: 19px; }
    .tasks-header   { padding: 18px 18px 6px; font-size: 19px; }
    .section-label  { padding: 16px 18px 8px; }
    .task-row       { padding: 12px 18px 14px; column-gap: 12px; }
  }
</style>
</head>
<body>

<section class="tasks-card" aria-label="My Tasks">

  <!-- Greeting -->
  <header class="tasks-greeting">
    <div class="tasks-avatar" aria-hidden="true">MA</div>
    <div>
      <h1 class="greeting-title">How are you today, Maria?</h1>
      <p class="greeting-sub">YYZ Base · Cabin Crew · Day 30</p>
    </div>
  </header>

  <div class="divider"></div>

  <h2 class="tasks-header">My Tasks</h2>

  <div id="tasksList"></div>
</section>

<script>
  const TASKS = [
    {
      section: 'Today',
      items: [
        {
          title: 'Complete pre-flight safety briefing review',
          sub: 'AC 203 · YYZ → YVR',
          pill: { kind: 'done',    label: 'Done' },
          done: true,
        },
        {
          title: 'Confirm galley setup — forward cabin',
          sub: 'AC 203 · Report by 07:45',
          pill: { kind: 'today',   label: 'Today' },
        },
        {
          title: 'Complete 30-day onboarding survey',
          sub: 'Cabin Crew Journey · Step 5 of 5',
          pill: { kind: 'journey', label: 'Journey' },
        },
      ],
    },
    {
      section: 'This Week',
      items: [
        {
          title: 'Submit uniform allowance claim',
          sub: 'HR · Via My HR in app',
          pill: { kind: 'date', label: 'May 22' },
        },
        {
          title: 'Emergency procedures recertification',
          sub: 'Required · YYZ Training Hub',
          pill: { kind: 'date', label: 'May 23' },
        },
        {
          title: 'Watch galley service update — 787 fleet',
          sub: 'New procedures effective this week',
          pill: { kind: 'date', label: 'May 25' },
        },
      ],
    },
  ];

  const CHECK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

  function render() {
    const list = document.getElementById('tasksList');
    list.innerHTML = TASKS.map(section => `
      <div class="section-label">${section.section}</div>
      <div class="tasks-list">
        ${section.items.map(t => `
          <div class="task-row${t.done ? ' done' : ''}">
            <span class="task-check" role="checkbox" aria-checked="${!!t.done}" aria-label="Mark ${t.title} as complete" tabindex="0">${CHECK_SVG}</span>
            <div class="task-body">
              <span class="task-title">${t.title}</span>
              ${t.sub ? `<span class="task-sub">${t.sub}</span>` : ''}
            </div>
            <span class="task-pill ${t.pill.kind}">${t.pill.label}</span>
          </div>
        `).join('')}
      </div>
    `).join('');

    list.querySelectorAll('.task-row').forEach(row => {
      const check = row.querySelector('.task-check');
      const toggle = () => {
        const done = row.classList.toggle('done');
        check.setAttribute('aria-checked', String(done));
      };
      check.addEventListener('click', toggle);
      check.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); }
      });
    });
  }

  render();
</script>
</body>
</html>
