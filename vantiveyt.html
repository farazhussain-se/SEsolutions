<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Lineage Video</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; }

.video-area {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  background: #000;
  overflow: hidden;
}
.video-area iframe {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 177.78%;          /* 16:9 inverse ratio — scales to fill height */
  height: 177.78%;         /* same multiplier keeps it proportional */
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%) scale(1.25);   /* 25% zoom kills the bars */
  border: none;
  display: block;
}
</style>
</head>
<body>

<div class="video-area">
  <iframe
    src="https://www.youtube.com/embed/QOs4FYvS7W4?rel=0&modestbranding=1&showinfo=0&autoplay=1&mute=1"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
