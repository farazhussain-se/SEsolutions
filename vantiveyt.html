<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Lineage Video</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; }

.video-area {
  position: relative;
  width: 100%;             /* fills whatever container it's in */
  padding-top: 56.25%;    /* 16:9 */
  background: #000;
  overflow: hidden;
}
.video-area iframe {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 110%;            /* overscan to push letterbox bars off-screen */
  height: 110%;
  transform: translate(-50%, -50%);
  border: none;
  display: block;
}
</style>
</head>
<body>

<div class="video-area">
  <iframe
    src="https://www.youtube.com/embed/QOs4FYvS7W4?rel=0&modestbranding=1&showinfo=0&autoplay=1&mute=1"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
